<script>
  /**
   * VORVO SELF-HEALING & ERROR RECOVERY SYSTEM
   * This script runs first to catch fatal errors and prevent the "Black Screen of Death".
   */
  window.addEventListener('error', function(event) {
    // If it's a syntax error in the main script, the app won't load.
    // We show the recovery UI immediately.
    console.error('Fatal App Error:', event.error);
    displayCrashRecovery(event.error);
  });

  window.addEventListener('unhandledrejection', function(event) {
    console.error('Unhandled Promise Rejection:', event.reason);
    // Optional: show recovery for promise rejections
  });

  function displayCrashRecovery(error) {
    // Wait for DOM to be ready if it's not
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => _show(error));
    } else {
      _show(error);
    }

    function _show(err) {
      const recoveryEl = document.getElementById('crash-recovery');
      const appEl = document.getElementById('app');
      if (recoveryEl) {
        if (appEl) appEl.style.display = 'none';
        recoveryEl.style.display = 'flex';
        const msgEl = document.getElementById('crash-message');
        if (msgEl && err) msgEl.textContent = err.message || err;
      }
    }
  }

  function runSelfRepair() {
    console.log('Running self-repair...');
    // Clear potentially corrupt state
    localStorage.clear();
    sessionStorage.clear();
    // Force reload ignoring cache
    window.location.reload(true);
  }
</script>

<style>
  /* ============================================================
     DESIGN TOKENS - Premium Property Services
     ============================================================ */
  :root {
    /* Premium Gold Palette */
    --gold: #B08D57;
    --gold-dark: #8C6A3B;
    --gold-light: #D4C09A;
    
    /* Text Colors - High Contrast for Accessibility */
    --ink: #FFFFFF;
    --ink-soft: #D8D8D8;
    --ink-mute: #888888;
    --charcoal: #111111;
    --charcoal-soft: #222222;
    
    /* Background Colors */
    --paper: #181818;
    --paper-deep: #111111;
    --paper-edge: #222222;
    --cream: #F7F4ED;
    --cream-dark: #EDE8DD;
    
    /* Legacy compatibility */
    --rule: var(--gold);
    --rule-soft: #333333;
    --gold-deep: var(--gold-dark);
    --gold-soft: var(--gold-light);
    
    /* Status Colors */
    --rust: #C75050;
    --moss: #4A9B6E;
    
    /* Shadows - More Subtle */

    --shadow-lift: 0 12px 40px rgba(0,0,0,0.16);
    --shadow-soft: 0 2px 12px rgba(0,0,0,0.08);
    
    /* Typography */
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
    
    /* Layout */
    --content-w: 720px;
    --wide-w: 1200px;
    --ultra-w: 1400px;
    
    /* Spacing Scale */
    --space-xs: 0.25rem;
    --space-sm: 0.5rem;
    --space-md: 1rem;
    --space-lg: 1.5rem;
    --space-xl: 2rem;
    --space-2xl: 3rem;
    --space-3xl: 4rem;
    --space-4xl: 6rem;
    
    /* Transitions */
    --transition-fast: 150ms ease;
    --transition-base: 250ms ease;
    --transition-slow: 400ms ease;
    --transition-hero: 1.2s ease-in-out;
  }
  
  /* ============================================================
     LIGHT MODE (for pages like Track Status)
     ============================================================ */
  .light-mode {
    --paper: #FFFFFF;
    --paper-deep: #F7F4ED;
    --paper-edge: #EDE8DD;
    --ink: #111111;
    --ink-soft: #333333;
    --ink-mute: #666666;
    --rule-soft: #E0D8CC;
  }
  
  /* ============================================================
     DARK MODE AUTO-DETECTION
     ============================================================ */

      --paper: #FFFFFF;
      --paper-deep: #F7F4ED;
      --paper-edge: #EDE8DD;
      --ink: #111111;
      --ink-soft: #333333;

    }
  }

  /* ============================================================
     BASE
     ============================================================ */

  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper-deep);
    background-image:
      radial-gradient(ellipse at top left, rgba(176, 141, 87, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(176, 141, 87, 0.02), transparent 50%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  /* Subtle paper grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.08 0 0 0 0 0.09 0 0 0 0 0.17 0 0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  #app { position: relative; z-index: 2; }

  /* ============================================================
     HERO - Photographic Carousel System
     ============================================================ */
  .hero {
    position: relative;
    min-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-bottom: none;
    background: #111;
  }
  
  /* Hero Image Carousel */
  .hero__carousel {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  
  .hero__slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity var(--transition-hero);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transform: scale(1);
    transition: opacity var(--transition-hero), transform 8s linear;

    transform: scale(1.1);

    margin-bottom: 1rem;

  /* Admin Dashboard Professional Styling */

    background: var(--paper);

    overflow: hidden;
    box-shadow: var(--shadow-lift);
    margin-top: 2rem;

    background: var(--charcoal-soft);
    color: #FFFFFF;
    text-align: left;
    padding: 1rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .admin-table td {
    padding: 1rem;
    border-bottom: 1px solid var(--rule-soft);
    color: var(--ink-soft);
  }

    background: rgba(255, 255, 255, 0.02);
  }
  .admin-table tr:hover {
    background: rgba(176, 141, 87, 0.05);
  }

  /* Pill Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.75rem;
    border-radius: 99px;
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge--contract { background: #3B82F6; color: #FFF; }
  .badge--signed { background: var(--moss); color: #FFF; }
  .badge--paid { background: #10B981; color: #FFF; }
  .badge--void { background: var(--rust); color: #FFF; }

    padding: 2.5rem;

    border-color: var(--gold);

  async init() {
    this.loadClient();
    
    // Fetch IP address and location via HTTPS
    fetch('https://ipinfo.io/json')

      .then(d => {
        this.state.ipAddress = d.ip || 'unavailable';
        const parts = [d.city, d.region, d.country].filter(Boolean);
        this.state.ipLocation = parts.join(', ') || 'unavailable';

        this.state.ipAddress = 'unavailable';

      });

    // Check Supabase auth session FIRST so admin login renders immediately
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session?.user) this.state.adminUser = session.user;

    // Listen for auth state changes
    supabaseClient.auth.onAuthStateChange((_event, session) => {
      const newUser = session?.user || null;
      const oldUser = this.state.adminUser;
      
      // Only re-render if the actual authentication status changed!
      const statusChanged = (newUser === null && oldUser !== null) || 
                            (newUser !== null && oldUser === null) || 
                            (newUser && oldUser && newUser.id !== oldUser.id);
                            
      if (statusChanged) {
        this.state.adminUser = newUser;
        this.render();
      }
    });

    // Only load agreement data on agreement route (not admin)
    const currentRoute = this.getRoute();
    if (currentRoute === 'agreement') {
      await loadAgreement();
      this.loadSignedState();
    } else if (currentRoute === 'property-management-agreement') {
      await loadPropertyManagementAgreement();
      this.loadSignedState();

        await loadAgreement();
        this.loadSignedState();

        await loadPropertyManagementAgreement();

      } else if (route === 'assignment') {
        await loadAssignmentAgreement();
        this.loadSignedState();
      } else if (route === 'guide') {
        this.loadSignedState();
      }
      this.render();
    });
    this.render();
  },

  loadClient() {
    const params = new URLSearchParams(window.location.search);
    const c = params.get('c');
    if (c) {
      try {
        const decoded = atob(c.replace(/-/g, '+').replace(/_/g, '/'));
        this.state.client = JSON.parse(decodeURIComponent(escape(decoded)));
      } catch (e) {
        console.warn('Failed to parse client param', e);
      }
    }
  },

  getUniqueAgreementId() {
    const route = this.getRoute();
    const clientId = this.state.client?.id || '';
    const contractId = this.state.contract?.id || '';
    
    if (route === 'property-management-agreement') {
      return `pm_${contractId || clientId}`;
    } else if (route === 'assignment') {
      return `as_${contractId || clientId}`;
    } else if (route === 'agreement' || route === 'guide') {
      return `surplus_${clientId}`;
    }
    return clientId ? `gen_${clientId}` : '';
  },

  loadSignedState() {
    try {
      const uniqueAgreementId = String(this.getUniqueAgreementId() || '');
      if (!uniqueAgreementId) {
        this.state.signature = null;
        this.state.typedName = '';
        this.state.signedAt = null;
        return;
      }
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed[uniqueAgreementId]) {
          const data = parsed[uniqueAgreementId];
          this.state.signature = data.signature;
          this.state.typedName = data.typedName;
          this.state.signedAt = data.signedAt;
        } else if (parsed.agreementId === uniqueAgreementId) {
          this.state.signature = parsed.signature;
          this.state.typedName = parsed.typedName;
          this.state.signedAt = parsed.signedAt;
        } else {
          this.state.signature = null;
          this.state.typedName = '';
          this.state.signedAt = null;
        }
      } else {
        this.state.signature = null;
        this.state.typedName = '';
        this.state.signedAt = null;
      }
    } catch (e) {
      console.warn('Failed to load signed state', e);
    }
  },

  saveSignedState() {
    try {
      const uniqueAgreementId = String(this.getUniqueAgreementId() || '');
      if (!uniqueAgreementId) return; // never save for guest/blank pages
      
      let storeData = {};
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object' && !parsed.agreementId) {
            storeData = parsed;
          } else if (parsed && parsed.agreementId) {
            storeData[parsed.agreementId] = {
              signature: parsed.signature,
              typedName: parsed.typedName,
              signedAt: parsed.signedAt
            };
          }
        } catch (e) {
          storeData = {};
        }
      }
      
      storeData[uniqueAgreementId] = {
        signature: this.state.signature,
        typedName: this.state.typedName,
        signedAt: this.state.signedAt
      };
      
      localStorage.setItem(STORE_KEY, JSON.stringify(storeData));
    } catch (e) { console.warn('Save failed', e); }
  },

   */
  setupErrorRecovery() {
    window.onerror = (msg, url, line, col, error) => {

        alert('Diagnostic data logged to console. Errors found: ' + logs.length);
      }
    });
  },

  /**
   * SELF-HEALING: Logic to handle fatal crashes
   */
  handleFatalError(error, source) {
    const errorMsg = error?.message || String(error);
    console.error(`[Vorvo Self-Healing] Fatal error from ${source}:`, errorMsg);
    
    // Log to localStorage for diagnostics
    try {
      const logs = JSON.parse(localStorage.getItem('vorvo-error-logs') || '[]');
      logs.push({
        time: new Date().toISOString(),
        source,
        message: errorMsg,
        stack: error?.stack,
        url: window.location.href
      });
      localStorage.setItem('vorvo-error-logs', JSON.stringify(logs.slice(-20)));
      
      const count = parseInt(localStorage.getItem('vorvo-crash-count') || '0') + 1;
      localStorage.setItem('vorvo-crash-count', count);
    } catch (e) {}

    // Show the recovery UI
    if (typeof displayCrashRecovery === 'function') {
      displayCrashRecovery(errorMsg);
    }
  },

  hasSigned() {
    return !!(this.state.signature && this.state.typedName && this.state.signedAt);

      }
      case 'track':     html += renderTrack(); break;
      case 'portal':
      default:          html += renderPortal(); break;

    html += renderFooter(route);
    app.innerHTML = html;
    bindHandlers(route);
    window.scrollTo(0, 0);
  },
};

/* ============================================================
   HELPERS
   ============================================================ */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function formatMoney(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '$ ______________';
  const num = Number(n);
  return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function stepCard(num, title, time, body) {
  const n = String(num).padStart(2, '0');
  return `
    <div class="step-card step-card--guide">
      <div class="step-card__header">
        <span class="step-card__num">${n}</span>
        <h3 class="step-card__title">${title}</h3>
        <span class="step-card__time">${time}</span>
      </div>
      <div class="step-card__body">${body}</div>
    </div>
  `;
}

function b64encJson(obj) {
  const json = JSON.stringify(obj);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return b64.replace(/\+/g, '-').replace(/\//g, '_');
}

function setupSignaturePad() {
  const pad = document.getElementById('sig-pad');
  const canvas = document.getElementById('sig-canvas');
  const clearBtn = document.getElementById('sig-clear');
  if (!pad || !canvas) return;

  const ctx = canvas.getContext('2d');
  let drawing = false;
  let hasInk = false;

  let lastWidth = 0;
  function resize() {
    const currentWidth = pad.offsetWidth;
    if (currentWidth === lastWidth) return;
    lastWidth = currentWidth;
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = currentWidth * ratio;
    canvas.height = pad.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.strokeStyle = '#15172b';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();
  window.addEventListener('resize', resize);

  function getPos(e) {
    const rect = pad.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top,
    };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if (!hasInk) {
      hasInk = true;
      pad.classList.add('signed');
    }
  }
  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
  }

  pad.addEventListener('mousedown', start);
  pad.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  pad.addEventListener('touchstart', start, { passive: false });
  pad.addEventListener('touchmove', move, { passive: false });
  pad.addEventListener('touchend', end, { passive: false });

  // Audit: log when signature is drawn
  pad.addEventListener('mouseup', () => {
    if (pad.classList.contains('signed')) {
      App.logAudit('Signature drawn on canvas');
    }
  });
  pad.addEventListener('touchend', () => {
    if (pad.classList.contains('signed')) {
      App.logAudit('Signature drawn on canvas (touch)');
    }
  });

  clearBtn?.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasInk = false;
    pad.classList.remove('signed');
    updateSubmitState();
  });

  // Update submit button state on signature change
  const observer = new MutationObserver(updateSubmitState);
  observer.observe(pad, { attributes: true, attributeFilter: ['class'] });
}

function setupSignSubmit() {
  const typedInput = document.getElementById('typed-name');
  const confirmBox = document.getElementById('confirm-box');
  const submit = document.getElementById('sign-submit');
  const emailInput = document.getElementById('sign-email');

  let nameLogTimer = null;
  typedInput?.addEventListener('input', () => {
    updateSubmitState();
    // Debounce — only log after user stops typing for 1 second
    clearTimeout(nameLogTimer);
    if (typedInput.value.trim().length >= 3) {
      nameLogTimer = setTimeout(() => {
        App.logAudit('Printed name confirmed: ' + typedInput.value.trim());
      }, 1000);
    }
  });

  confirmBox?.addEventListener('change', () => {
    updateSubmitState();
    if (confirmBox.checked) {
      App.logAudit('Agreement confirmation checkbox checked');
    }
  });

  emailInput?.addEventListener('input', updateSubmitState);

  submit?.addEventListener('click', async () => {
    const errEl = document.getElementById('sign-error');
    const pad = document.getElementById('sig-pad');
    const canvas = document.getElementById('sig-canvas');
    const typedName = typedInput.value.trim();
    const clientEmail = emailInput.value.trim();

    // Validation — all guards up front
    if (!pad.classList.contains('signed')) {
      errEl.textContent = 'Please draw your signature in the box above.';
      errEl.style.display = 'block';
      return;
    }
    if (typedName.length < 3) {
      errEl.textContent = 'Please type your full legal name to confirm your signature.';
      errEl.style.display = 'block';
      return;
    }
    if (!confirmBox.checked) {
      errEl.textContent = 'Please check the confirmation box to agree to the terms.';
      errEl.style.display = 'block';
      return;
    }
    if (!clientEmail) {
      errEl.textContent = 'Please enter your email address to receive a copy of this agreement.';
      errEl.style.display = 'block';
      return;
    }

    // Prevent double-submit
    submit.disabled = true;
    submit.textContent = 'Submitting…';

    App.state.signature = canvas.toDataURL('image/png');
    App.state.typedName = typedName;
    App.state.signedAt = new Date().toISOString();
    App.saveSignedState();

    // Log audit entries before DB write so they're captured in the record
    App.logAudit('Sign button clicked');
    App.logAudit('Agreement submitted — routing to claims guide');

    // UPDATE SUPABASE
    const agreementId = App.state.client?.id;
    if (agreementId) {
      const { error } = await supabaseClient
        .from('agreements')
        .update({
          signed: true,
          signature_data: App.state.signature,
          signer_name: typedName,
          signed_at: App.state.signedAt,
          claimant_email: clientEmail,
        })
        .eq('id', agreementId);

      if (error) {
        console.error('Supabase update failed for id', agreementId, '—', error.message, error.details);
      } else {
        console.log('Supabase updated for id:', agreementId);
      }
    } else {
      console.error('No agreementId on App.state.client — DB update skipped. client:', JSON.stringify(App.state.client));
    }

    // SEND EMAIL — clean and simple, no PDF generation needed
    const accessToken = App.state.client?.accessToken;
    const agreementPageUrl = `${window.location.origin}${window.location.pathname}#/agreement?token=${accessToken}`;
    try {
      const res = await fetch('/api/send-agreement', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          accessToken,
          typedName,
          signedAt: App.state.signedAt,
          trackingId: App.state.client?.trackingId || '',
          claimantName: App.state.client?.claimantName || typedName,
          propertyId: App.state.client?.propertyId || '',
          estimatedValue: App.state.client?.estimatedValue || null,
          reportedOwner: App.state.client?.reportedOwnerName || '',
          clientEmail,
          ipAddress: App.state.ipAddress || 'unavailable',
          ipLocation: App.state.ipLocation || 'unavailable',
          auditLog: App.state.auditLog,
          agreementId,
          agreementPageUrl,
        }),
      });
      const result = await res.json();
      if (!res.ok) console.error('[Vorvo] Email API error:', result);
      else console.log('[Vorvo] Email sent ✓');
    } catch (err) {
      console.error('[Vorvo] Email send failed:', err.message);
    }

    window.location.hash = '#/guide';
    App.render();
  });
}

function updateSubmitState() {
  const submit = document.getElementById('sign-submit');
  if (!submit) return;
  const pad     = document.getElementById('sig-pad');
  const typed   = document.getElementById('typed-name');
  const confirm = document.getElementById('confirm-box');
  const email   = document.getElementById('sign-email');
  // CRITICAL: never allow signing without a real agreementId loaded from Supabase
  const hasAgreementId = !!(App.state.client?.id);
  const ready   = hasAgreementId
               && pad?.classList.contains('signed')
               && typed?.value.trim().length >= 3
               && confirm?.checked
               && email?.value.trim().length > 0;
  submit.disabled = !ready;
  // Show a warning if no agreement ID (blank page accessed directly)
  const errEl = document.getElementById('sign-error');
  if (errEl && !hasAgreementId) {
    errEl.style.display = 'block';
    errEl.textContent = 'This agreement link is invalid. Please use the personalized link sent to you by Vorvo.';
  }
}

    const handleFiles = (files) => {
      for (const file of files) {

        selectedFiles.push(file);
        
        const reader = new FileReader();
        reader.onload = (e) => {

            if (selectedFiles.length === 0) {

          });

        };

      }

    };

    dropzone?.addEventListener('dragover', (e) => {

    });

      const ctx = canvas.getContext('2d');

      let hasInk = false;

      let lastWidth = 0;
      const resizeCanvas = () => {
        const rect = canvas.getBoundingClientRect();
        const currentWidth = rect.width;
        if (currentWidth === lastWidth) return;
        lastWidth = currentWidth;
        canvas.width = currentWidth;
        canvas.height = rect.height;
        ctx.strokeStyle = '#15172b';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
      };
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      };

      const startDraw = (e) => {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
      };

      const draw = (e) => {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        hasInk = true;
        e.preventDefault();
      };

      const stopDraw = () => { drawing = false; };

      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDraw);
      canvas.addEventListener('mouseleave', stopDraw);

      canvas.addEventListener('touchstart', startDraw, { passive: false });
      canvas.addEventListener('touchmove', draw, { passive: false });
      canvas.addEventListener('touchend', stopDraw, { passive: false });

      document.getElementById('ca-sig-clear')?.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

                let lastWidth = 0;
                const resizeCanvas = () => {
                  const rect = canvas.getBoundingClientRect();
                  const currentWidth = rect.width;
                  if (currentWidth === lastWidth) return;
                  lastWidth = currentWidth;
                  canvas.width = currentWidth;
                  canvas.height = rect.height;
                  ctx.strokeStyle = '#15172b';
                  ctx.lineWidth = 2.5;
                  ctx.lineCap = 'round';
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                const getPos = (e) => {
                  const rect = canvas.getBoundingClientRect();
                  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                  return { x: clientX - rect.left, y: clientY - rect.top };
                };
                
                const startDraw = (e) => {
                  drawing = true;
                  const pos = getPos(e);
                  ctx.beginPath();
                  ctx.moveTo(pos.x, pos.y);
                  e.preventDefault();
                };
                
                const draw = (e) => {
                  if (!drawing) return;
                  const pos = getPos(e);
                  ctx.lineTo(pos.x, pos.y);
                  ctx.stroke();
                  hasInk = true;
                  e.preventDefault();
                };
                
                const stopDraw = () => { drawing = false; };
                
                canvas.addEventListener('mousedown', startDraw);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDraw);
                canvas.addEventListener('mouseleave', stopDraw);
                
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDraw, { passive: false });

                        body: JSON.stringify({

                          trackingId: data.tracking_id,
                          description: `Vorvo Direct Labor Payment - ${data.tracking_id}`
                        })
                      });
                      const piData = await piRes.json();
                      if (!piRes.ok) throw new Error(piData.error || 'Failed to create PaymentIntent');
                      
                      const stripeResult = await stripe.confirmCardPayment(piData.clientSecret, {
                        payment_method: {
                          card: cardElement,
                          billing_details: { name: data.full_name, email: data.email, phone: data.phone }
                        }
                      });
                      
                      if (stripeResult.error) {
                        throw new Error(stripeResult.error.message);
                      }
                      
                      App.logAudit('Stripe payment authorized successfully: ' + stripeResult.paymentIntent.id);
                    } catch (err) {
                      alert('Payment Authorization Failed: ' + err.message);
                      submitBtn.disabled = false;
                      submitBtn.textContent = 'Accept Quote & Sign Contract →';
                      return;
                    }
                  }

                        signatureData: signatureData,
                        paymentMethod: paymentMethod,

                    formspreeData.append('paymentMethod', paymentMethod);
                    formspreeData.append('selectedOptionIndex', selectedOptionIdx);
                    formspreeData.append('assignedProvider', selectedProviderName);
                    
                    fetch('https://formspree.io/f/xqejewzo', {
                      method: 'POST',
                      body: formspreeData,
                      headers: { 'Accept': 'application/json' }

                    alert('Agreement Signed successfully! Your job is now scheduled.');
                    doLookup(); // Refresh the status view
                  } catch (err) {
                    console.error('Contract signing error:', err);
                    alert('Failed to sign agreement: ' + err.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Accept Quote & Sign Contract →';

                });
              }

        const updateDeleteAgreementsVisibility = () => {
          const checkedCount = container.querySelectorAll('.agreement-select:checked').length;
          if (deleteAgreementsBtn) {
            deleteAgreementsBtn.style.display = checkedCount > 0 ? 'inline-block' : 'none';
            deleteAgreementsBtn.textContent = `Delete Selected (${checkedCount})`;
          }
        };

        selectAllAgreements?.addEventListener('change', (e) => {
          agreementCheckboxes.forEach(cb => {
            cb.checked = e.target.checked;
          });
          updateDeleteAgreementsVisibility();
        });

        agreementCheckboxes.forEach(cb => {
          cb.addEventListener('change', () => {
            if (selectAllAgreements) {
              selectAllAgreements.checked = Array.from(agreementCheckboxes).every(c => c.checked);
            }
            updateDeleteAgreementsVisibility();
          });
        });

        if (deleteAgreementsBtn && !deleteAgreementsBtn.dataset.bound) {
          deleteAgreementsBtn.dataset.bound = 'true';
          deleteAgreementsBtn.addEventListener('click', async () => {
            const checkedBoxes = container.querySelectorAll('.agreement-select:checked');
            const idsToDelete = Array.from(checkedBoxes).map(cb => cb.getAttribute('data-id'));
            if (idsToDelete.length === 0) return;
            
            if (confirm(`Are you sure you want to permanently delete the ${idsToDelete.length} selected agreement(s)? This action cannot be undone.`)) {
              deleteAgreementsBtn.disabled = true;
              deleteAgreementsBtn.textContent = 'Deleting...';
              try {
                const { error } = await supabaseClient
                  .from('agreements')
                  .delete()
                  .in('id', idsToDelete);
                  
                if (error) throw error;
                alert('Selected agreements deleted successfully!');
                await loadAgreements();
              } catch (err) {
                console.error('Error deleting agreements:', err);
                alert('Failed to delete agreements: ' + err.message);
              } finally {
                deleteAgreementsBtn.disabled = false;
                updateDeleteAgreementsVisibility();
              }
            }
          });
        }

        console.error('Error loading agreements:', err);

                    <input type="number" class="ew-deposit" step="0.01" value="${q.deposit_amount || ''}" placeholder="e.g., 1000.00" style="width:100%; padding:0.5rem; border:1px solid var(--rule); background:var(--paper);" />
                  </div>
                  <div class="field" style="margin:0;">
                    <label style="font-size:0.75rem;">Closing Date</label>
                    <input type="date" class="ew-closing-date" value="${q.closing_date || ''}" style="width:100%; padding:0.45rem; border:1px solid var(--rule); background:var(--paper); color:var(--ink);" />
                  </div>
                  <div class="field" style="margin:0; grid-column: span 2;">
                    <label style="font-size:0.75rem;">Custom Contract Terms</label>
                    <input type="text" class="ew-terms" value="${q.contract_terms || ''}" placeholder="e.g., Subject to 15-day inspection. Closing on or before June 30." style="width:100%; padding:0.5rem; border:1px solid var(--rule); background:var(--paper);" />
                  </div>
                  <div class="field" style="margin:0; grid-column: span 3;">
                    <label style="font-size:0.75rem;">Internal Notes</label>
                    <input type="text" class="ew-notes" value="${q.internal_notes || ''}" placeholder="e.g., Investor match: John Doe. Target margin: 15%." style="width:100%; padding:0.5rem; border:1px solid var(--rule); background:var(--paper);" />
                  </div>
                  
                  <div style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; border-top: 1px solid var(--rule-soft); padding-top: 1.5rem; text-align: left;">
                    ${contractsListHTML}
                    ${contractFormHTML}
                  </div>
                  
                  <div style="display:flex; gap:0.5rem; justify-content:flex-end; grid-column: span 3; margin-top:0.5rem;">
                    <button type="button" class="btn btn--small btn--ghost btn-cancel-edit-wholesale" data-id="${q.id}" style="background:none; border:1px solid var(--rule); color:var(--ink-mute);">Cancel</button>
                    <button type="button" class="btn btn--small btn--gold btn-save-wholesale" data-id="${q.id}">Save Changes</button>
                  </div>
                </div>
          `;
        });
        
        html += '</tbody></table></div>';
        container.innerHTML = html;
        
        // Re-expand previously open row if any
        if (App.state.expandedPropertyManagementId) {
          const editRow = document.getElementById(`edit-wholesale-row-${App.state.expandedWholesaleId}`);
          if (editRow) editRow.style.display = 'table-row';
        }
        
        // Bind inline edit handlers
        container.querySelectorAll('.btn-edit-wholesale').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const editRow = document.getElementById(`edit-wholesale-row-${id}`);
            if (editRow) {
              // Hide all other open edit rows first
              container.querySelectorAll('.edit-wholesale-row').forEach(row => {
                if (row.id !== `edit-wholesale-row-${id}`) row.style.display = 'none';
              });
              const isShowing = editRow.style.display === 'table-row';
              editRow.style.display = isShowing ? 'none' : 'table-row';
              App.state.expandedWholesaleId = isShowing ? null : id;
            }
          });
        });
        
        container.querySelectorAll('.btn-cancel-edit-wholesale').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const editRow = document.getElementById(`edit-wholesale-row-${id}`);
            if (editRow) editRow.style.display = 'none';
            App.state.expandedPropertyManagementId = null;
          });
        });

        // Bind copy link handlers
        container.querySelectorAll('.btn-copy-contract-link').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const link = e.currentTarget.getAttribute('data-link');
            navigator.clipboard.writeText(link);
            const origText = e.currentTarget.textContent;
            e.currentTarget.textContent = 'Copied!';
            setTimeout(() => e.currentTarget.textContent = origText, 1500);
          });
        });

        // Bind void contract handlers
        container.querySelectorAll('.btn-void-contract').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            if (!confirm('Are you sure you want to VOID this contract? This will permanently disable the signature link.')) return;
            
            e.currentTarget.disabled = true;
            e.currentTarget.textContent = 'Voiding...';
            
            try {
              const { data: { session } } = await supabaseClient.auth.getSession();
              const voidRes = await fetch(`/api/contracts?action=void`, {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${session?.access_token || ''}`
                },
                body: JSON.stringify({ contractId: id })
              });
              
              if (!voidRes.ok) throw new Error('Failed to void contract');
              alert('Contract voided successfully!');
              
              // Save expanded state
              const row = e.currentTarget.closest('.edit-wholesale-row');
              if (row) {
                const dealId = row.id.replace('edit-wholesale-row-', '');
                App.state.expandedPropertyManagementId = dealId;
              }
              
              await loadPropertyManagementLeads();
            } catch (err) {
              alert('Error voiding contract: ' + err.message);
              e.currentTarget.disabled = false;
              e.currentTarget.textContent = 'Void';
            }
          });
        });

        // Setup inline contract form toggles and submission
        container.querySelectorAll('.inline-generate-contract-form').forEach(form => {
          const dealId = form.getAttribute('data-deal-id');
          const q = data.find(item => item.id === dealId);
          if (!q) return;
          const typeSelect = form.querySelector('.igc-type');
          const buyerFields = form.querySelector('.igc-buyer-fields');
          const titleFields = form.querySelector('.igc-title-fields');
          const feeField = form.querySelector('.field-igc-assignment-fee');
          const contractDateField = form.querySelector('.field-igc-contract-date');
          const totalPriceField = form.querySelector('.field-igc-total-price');
          
          const purchasePriceInput = form.querySelector('.igc-purchase-price');
          const totalPriceInput = form.querySelector('.igc-total-price');
          const assignmentFeeInput = form.querySelector('.igc-assignment-fee');
          const contractDateInput = form.querySelector('.igc-contract-date');
          
          const updateAssignmentFee = () => {
            const originalPrice = parseFloat(purchasePriceInput.value) || 0;
            const totalAcquisition = parseFloat(totalPriceInput.value) || 0;
            if (assignmentFeeInput) {
              assignmentFeeInput.value = Math.max(0, totalAcquisition - originalPrice).toFixed(2);
            }
          };
          
          purchasePriceInput?.addEventListener('input', updateAssignmentFee);
          totalPriceInput?.addEventListener('input', updateAssignmentFee);
          
          const toggle = () => {
            const type = typeSelect.value;
            const purchasePriceLabel = purchasePriceInput ? purchasePriceInput.previousElementSibling : null;
            const earnestMoneyInput = form.querySelector('.igc-earnest-money');
            const earnestMoneyLabel = earnestMoneyInput ? earnestMoneyInput.previousElementSibling : null;

            if (type === 'assignment') {
              buyerFields.style.display = 'grid';
              if (titleFields) titleFields.style.display = 'grid';
              feeField.style.display = 'block';
              contractDateField.style.display = 'block';
              if (totalPriceField) totalPriceField.style.display = 'block';
              
              if (purchasePriceLabel) purchasePriceLabel.textContent = 'Original Purchase Price ($)';
              if (earnestMoneyLabel) earnestMoneyLabel.textContent = 'Earnest Deposit ($)';
              
              // Pre-fill fields for assignment
              if (purchasePriceInput) purchasePriceInput.value = q.asking_price || '';
              if (totalPriceInput) totalPriceInput.value = q.offer_amount || '';
              updateAssignmentFee();
              
              // Make contract date required for assignment
              if (contractDateInput) contractDateInput.required = true;
              
              form.querySelector('.igc-buyer-name').required = true;
              form.querySelector('.igc-buyer-email').required = true;
              form.querySelector('.igc-buyer-phone').required = true;
              form.querySelector('.igc-buyer-address').required = true;
            } else {
              buyerFields.style.display = 'none';
              if (titleFields) titleFields.style.display = 'none';
              feeField.style.display = 'none';
              contractDateField.style.display = 'none';
              if (totalPriceField) totalPriceField.style.display = 'none';
              
              if (purchasePriceLabel) purchasePriceLabel.textContent = 'Purchase Price ($)';
              if (earnestMoneyLabel) earnestMoneyLabel.textContent = 'Earnest Money ($)';
              
              // Reset fields for purchase
              if (purchasePriceInput) purchasePriceInput.value = q.offer_amount || q.asking_price || '';
              
              // Make contract date not required for purchase
              if (contractDateInput) contractDateInput.required = false;
              
              form.querySelector('.igc-buyer-name').required = false;
              form.querySelector('.igc-buyer-email').required = false;
              form.querySelector('.igc-buyer-phone').required = false;
              form.querySelector('.igc-buyer-address').required = false;
            }
          };
          
          typeSelect.addEventListener('change', toggle);
          toggle();
          
          form.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Generating...';
            
            const dealId = form.getAttribute('data-deal-id');
            const contractType = typeSelect.value;
            const state = form.querySelector('.igc-state').value;
            const purchasePrice = parseFloat(form.querySelector('.igc-purchase-price').value);
            const earnestMoney = parseFloat(form.querySelector('.igc-earnest-money').value);
            const assignmentFee = parseFloat(form.querySelector('.igc-assignment-fee').value) || null;
            const closingDate = form.querySelector('.igc-closing-date').value;
            const originalContractDate = form.querySelector('.igc-contract-date').value || null;
            const inspectionPeriod = parseInt(form.querySelector('.igc-inspection-period').value) || 15;
            const contractTerms = form.querySelector('.igc-terms').value.trim();
            
            // Validate Original Contract Date for Assignment Agreements
            if (contractType === 'assignment' && !originalContractDate) {
              alert('Original Contract Date Required. Please enter the date of the original Purchase Agreement.');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Generate Contract';
              return;
            }
            
            const dealData = {
              purchase_price: purchasePrice,
              earnest_money: earnestMoney,
              assignment_fee: assignmentFee,
              closing_date: closingDate,
              original_contract_date: originalContractDate,
              inspection_period: inspectionPeriod,
              contract_terms: contractTerms
            };
            
            let buyerInfo = null;
            if (contractType === 'assignment') {
              buyerInfo = {
                legal_name: form.querySelector('.igc-buyer-name').value.trim(),
                entity_name: form.querySelector('.igc-buyer-entity').value.trim() || null,
                email: form.querySelector('.igc-buyer-email').value.trim(),
                phone: form.querySelector('.igc-buyer-phone').value.trim(),
                mailing_address: form.querySelector('.igc-buyer-address').value.trim(),
                proof_of_funds_url: form.querySelector('.igc-buyer-pof').value.trim() || null
              };
              
              // Add title company info if available
              const titleCompany = form.querySelector('.igc-title-company')?.value.trim() || null;
              const titleAddress = form.querySelector('.igc-title-address')?.value.trim() || null;
              
              if (titleCompany) {
                dealData.title_company = titleCompany;
                dealData.title_address = titleAddress;
              }
            }
            
            try {
              const { data: { session } } = await supabaseClient.auth.getSession();
              const createRes = await fetch('/api/contracts', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${session?.access_token || ''}`
                },
                body: JSON.stringify({
                  dealId,
                  contractType,
                  state,
                  dealData,
                  buyerInfo
                })
              });
              
              const result = await createRes.json();
              if (!createRes.ok) throw new Error(result.error || 'Failed to generate contract');
              
              alert('Contract generated and link created successfully!');
              App.state.expandedPropertyManagementId = dealId;
              await loadPropertyManagementLeads();
            } catch (err) {
              console.error('Error generating contract:', err);
              alert('Failed to generate contract: ' + err.message);
            } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = 'Generate Contract';
            }
          };
        });
        
        container.querySelectorAll('.btn-save-wholesale').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const formDiv = container.querySelector(`.edit-wholesale-form[data-id="${id}"]`);
            if (!formDiv) return;
            
            const submitBtn = e.currentTarget;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            const status = formDiv.querySelector('.ew-status').value;
            const governingState = formDiv.querySelector('.ew-state').value;
            const askingPrice = parseFloat(formDiv.querySelector('.ew-asking').value) || null;
            const estimatedValue = parseFloat(formDiv.querySelector('.ew-value').value) || null;
            const offerAmount = parseFloat(formDiv.querySelector('.ew-offer').value) || null;
            const depositAmount = parseFloat(formDiv.querySelector('.ew-deposit').value) || null;
            const closingDate = formDiv.querySelector('.ew-closing-date').value || null;
            const contractTerms = formDiv.querySelector('.ew-terms').value.trim() || null;
            const internalNotes = formDiv.querySelector('.ew-notes').value.trim() || null;
            
            try {
              const { error } = await supabaseClient
                .from('wholesale_leads')
                .update({
                  status,
                  governing_state: governingState,
                  asking_price: askingPrice,
                  estimated_value: estimatedValue,
                  offer_amount: offerAmount,
                  deposit_amount: depositAmount,
                  closing_date: closingDate,
                  contract_terms: contractTerms,
                  internal_notes: internalNotes
                })
                .eq('id', id);
                
              if (error) throw error;
              App.state.expandedPropertyManagementId = id;
              await loadPropertyManagementLeads();
              alert('Changes saved successfully!');
            } catch (err) {
              console.error('Error updating wholesale lead:', err);
              alert('Failed to save changes: ' + err.message);
              submitBtn.disabled = false;
              submitBtn.textContent = 'Save Changes';
            }
          });
        });
        
        // Checkbox handling and bulk delete for wholesale leads
        const selectAllWholesale = document.getElementById('select-all-wholesale');
        const wholesaleCheckboxes = container.querySelectorAll('.wholesale-select');
        const deleteWholesaleBtn = document.getElementById('btn-delete-wholesale');
        
        const updateDeleteButtonVisibility = () => {
          const checkedCount = container.querySelectorAll('.wholesale-select:checked').length;
          if (deleteWholesaleBtn) {
            deleteWholesaleBtn.style.display = checkedCount > 0 ? 'inline-block' : 'none';
            deleteWholesaleBtn.textContent = `Delete Selected (${checkedCount})`;
          }
        };

        selectAllWholesale?.addEventListener('change', (e) => {
          wholesaleCheckboxes.forEach(cb => {
            cb.checked = e.target.checked;
          });
          updateDeleteButtonVisibility();
        });

        wholesaleCheckboxes.forEach(cb => {
          cb.addEventListener('change', () => {
            if (selectAllWholesale) {
              selectAllWholesale.checked = Array.from(wholesaleCheckboxes).every(c => c.checked);
            }
            updateDeleteButtonVisibility();
          });
        });

        if (deleteWholesaleBtn && !deleteWholesaleBtn.dataset.bound) {
          deleteWholesaleBtn.dataset.bound = 'true';
          deleteWholesaleBtn.addEventListener('click', async () => {
            const checkedBoxes = container.querySelectorAll('.wholesale-select:checked');
            const idsToDelete = Array.from(checkedBoxes).map(cb => cb.getAttribute('data-id'));
            if (idsToDelete.length === 0) return;
            
            if (confirm(`Are you sure you want to permanently delete the ${idsToDelete.length} selected lead(s)? This action cannot be undone.`)) {
              deleteWholesaleBtn.disabled = true;
              deleteWholesaleBtn.textContent = 'Deleting...';
              try {
                const { error } = await supabaseClient
                  .from('wholesale_leads')
                  .delete()
                  .in('id', idsToDelete);
                  
                if (error) throw error;
                alert('Selected leads deleted successfully!');
                await loadPropertyManagementLeads();
              } catch (err) {
                console.error('Error deleting leads:', err);
                alert('Failed to delete leads: ' + err.message);
              } finally {
                deleteWholesaleBtn.disabled = false;
                updateDeleteButtonVisibility();
              }
            }
          });
        }
        
      } catch (err) {
        console.error('Error loading property management leads:', err);
        container.innerHTML = `<div style="color:var(--rust); padding:1rem; text-align:center;"><strong>Failed to load requests</strong><br>${esc(err.message)}</div>`;
      }
    }

    async function loadPropertyQuotes() {
      const container = document.getElementById('property-quotes-list');
      if (!container) return;
      container.innerHTML = '<div style="text-align:center; padding:2rem; font-family:var(--mono); font-size:0.9rem; color:var(--ink-mute);">Loading requests from database...</div>';
      
      try {
        const { data, error } = await supabaseClient
          .from('property_quotes')
          .select('*')
          .order('created_at', { ascending: false });
          
        if (error) throw error;
        
        if (!data || data.length === 0) {
          container.innerHTML = '<p style="color:var(--ink-mute); font-style:italic; padding:1rem; text-align:center;">No quote requests found in the database.</p>';
          return;
        }
        
        let html = `
          <table class="agreement-table admin-table" style="width:100%; font-size:0.9rem; border-collapse:collapse; margin-top:1rem;">
            <thead>
              <tr style="background:var(--ink); color:var(--paper); text-align:left;">
                <th style="padding:0.75rem; width: 40px; text-align:center;"><input type="checkbox" id="select-all-property" /></th>
                <th style="padding:0.75rem;">Tracking ID</th>
                <th style="padding:0.75rem;">Customer</th>
                <th style="padding:0.75rem;">Service</th>
                <th style="padding:0.75rem;">Current Status</th>
                <th style="padding:0.75rem;">Contract Status</th>
                <th style="padding:0.75rem;">Payment Status</th>
                <th style="padding:0.75rem;">Quote</th>
                <th style="padding:0.75rem; text-align:center;">Actions</th>
              </tr>
            </thead>
            <tbody>
        `;
        
        data.forEach(q => {
          const statusColors = {
            'new': 'var(--gold-deep)',
            'quoted': 'var(--gold-soft)',
            'scheduled': 'var(--moss)',
            'completed': 'var(--moss)',
            'cancelled': 'var(--rust)'
          };
          const color = statusColors[q.status] || 'var(--ink-mute)';
          const badgeClass = `badge badge--${
            q.status === 'new' ? 'new' :
            q.status === 'quoted' ? 'scheduled' :
            q.status === 'scheduled' ? 'contract' :
            q.status === 'completed' ? 'paid' :
            q.status === 'cancelled' ? 'void' : 'new'
          }`;
          
          // Contract Status
          const contractLabel = q.contract_signed_at ? 'Signed' : 'Awaiting Sign';
          const contractColor = q.contract_signed_at ? 'var(--moss)' : 'var(--gold-deep)';
          
          // Payment Status
          let paymentLabel = 'Unpaid';
          let paymentColor = 'var(--rust)';
          if (q.payment_method) {
            if (q.status === 'completed') {
              paymentLabel = 'Paid';
              paymentColor = 'var(--moss)';
            } else {
              paymentLabel = 'Authorized';
              paymentColor = 'var(--gold-soft)';
            }
          }
          
          const contractLink = `${window.location.origin}/#/track?id=${q.tracking_id}`;
          
          html += `
            <tr style="border-bottom:1px solid var(--rule-soft);" id="quote-row-${q.id}">
              <td style="padding:0.75rem; text-align:center;"><input type="checkbox" class="property-select" data-id="${q.id}" /></td>
              <td style="padding:0.75rem; font-family:var(--mono); font-weight:bold;">${esc(q.tracking_id)}</td>
              <td style="padding:0.75rem;"><strong>${esc(q.full_name)}</strong><br><small style="color:var(--ink-mute);">${esc(q.phone)} | ${esc(q.email)}</small></td>
              <td style="padding:0.75rem; text-transform:capitalize;">${esc(q.service_category)}</td>
              <td style="padding:0.75rem;"><span class="${badgeClass}">${esc(q.status)}</span></td>
              <td style="padding:0.75rem;"><span style="color:${contractColor}; font-weight:bold; text-transform:uppercase; font-size:0.8rem;">${contractLabel}</span></td>
              <td style="padding:0.75rem;"><span style="color:${paymentColor}; font-weight:bold; text-transform:uppercase; font-size:0.8rem;">${paymentLabel}</span></td>
              <td style="padding:0.75rem;">${q.quote_amount ? formatMoney(q.quote_amount) : '<em>Pending</em>'}</td>
              <td style="padding:0.75rem; text-align:center;">
                <button class="btn btn--small btn--ghost btn-edit-quote" data-id="${q.id}" style="padding:0.25rem 0.6rem; font-size:0.75rem;">Manage</button>
              </td>
            </tr>
            <tr id="edit-row-${q.id}" class="edit-quote-row" style="display:none; background:var(--paper-deep); border-bottom:2px solid var(--rule);">
              <td colspan="8" style="padding:1.5rem;">
                <form class="edit-quote-form" data-id="${q.id}" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:1.5rem; align-items:flex-start;">
                  
                  <!-- Left Column: Request Details & General Settings -->
                  <div style="display:flex; flex-direction:column; gap:1.25rem;">
                    
                    <!-- Original Request Box -->
                    <div style="border:1px solid var(--rule-soft); padding:1rem; border-radius:4px; background:rgba(255,255,255,0.01); font-size:0.85rem; line-height:1.5; color:var(--ink-soft);">
                      <strong style="color:var(--gold); font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid var(--rule-soft); padding-bottom:0.25rem; display:block; margin-bottom:0.5rem;">Client's Original Request</strong>
                      <div style="margin-bottom:0.5rem;"><strong>Service Requested:</strong><br><span style="text-transform:capitalize; color:var(--ink); font-weight:bold;">${esc(q.service_category)}</span></div>
                      <div style="margin-bottom:0.5rem;"><strong>Service Location:</strong><br><span style="color:var(--ink); font-weight:bold;">${esc(q.location_address)}</span></div>
                      <div style="margin-bottom:0.5rem;"><strong>Job Details:</strong><br><p style="margin:0.25rem 0 0; color:var(--ink); white-space:pre-wrap; font-size:0.8rem; background:var(--paper); padding:0.5rem; border:1px solid var(--rule-soft); border-radius:3px;">${esc(q.job_details)}</p></div>
                      
                      ${q.image_urls && q.image_urls.length > 0 ? `
                        <div>
                          <strong>Uploaded Photos (${q.image_urls.length}):</strong><br>
                          <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.4rem;">
                            ${q.image_urls.map(url => `
                              <a href="${url}" target="_blank" title="View full photo" style="display:block; width:50px; height:50px; border:1px solid var(--rule-soft); border-radius:3px; overflow:hidden;">
                                <img src="${url}" style="width:100%; height:100%; object-fit:cover;" />
                              </a>
                            `).join('')}
                          </div>
                        </div>
                      ` : ''}
                    </div>

                    <!-- General Settings -->
                    <div class="field" style="margin:0;">
                      <label style="font-size:0.75rem; font-weight:bold; color:var(--gold);">Job Status (Must be QUOTED for client to see contract)</label>
                      <select class="eq-status" style="width:100%; padding:0.5rem; border:1px solid var(--rule); background:var(--paper);">
                        <option value="new" ${q.status === 'new' ? 'selected' : ''}>Awaiting Provider Match (NEW)</option>
                        <option value="quoted" ${q.status === 'quoted' ? 'selected' : ''}>Quote Prepared (QUOTED)</option>
                        <option value="scheduled" ${q.status === 'scheduled' ? 'selected' : ''}>Job Scheduled (SCHEDULED)</option>
                        <option value="completed" ${q.status === 'completed' ? 'selected' : ''}>Completed (COMPLETED)</option>
                        <option value="cancelled" ${q.status === 'cancelled' ? 'selected' : ''}>Cancelled (CANCELLED)</option>
                      </select>
                    </div>

                    <div class="field" style="margin:0;">
                      <label style="font-size:0.75rem;">Internal Coordination Notes</label>
                      <input type="text" class="eq-notes" value="${q.internal_notes || ''}" placeholder="e.g., Payout to Careful Movers: $120. Profit margin: 20%." style="width:100%; padding:0.5rem; border:1px solid var(--rule); background:var(--paper);" />
                    </div>

                    <!-- Option 2 Block -->
                    <div style="display:grid; grid-template-columns:1fr; gap:0.75rem; border:1px dashed var(--rule-soft); padding:1rem; border-radius:4px; background:rgba(255,255,255,0.01);">

                      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:0.5rem;">
                        <div class="field" style="margin:0;">
                          <label style="font-size:0.7rem;">Quote Amount ($)</label>
                          <input type="number" class="eq-amount-2" step="0.01" value="${q.quote_amount_2 || ''}" placeholder="e.g., 120.00" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
                        </div>

                          <label style="font-size:0.7rem;">Provider Name</label>

                        </div>
                        <div class="field" style="margin:0;">
                          <label style="font-size:0.7rem;">Provider Phone</label>
                          <input type="text" class="eq-provider-phone-2" value="${q.provider_phone_2 || ''}" placeholder="e.g., 832-555-1212" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
                        </div>

                          <label style="font-size:0.7rem;">Est. Schedule/Timeframe</label>

                      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:0.5rem;">
                        <div class="field" style="margin:0;">

                          <input type="number" class="eq-amount-3" step="0.01" value="${q.quote_amount_3 || ''}" placeholder="e.g., 220.00" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
                        </div>
                        <div class="field" style="margin:0;">
                          <label style="font-size:0.7rem;">Provider Name</label>
                          <input type="text" class="eq-provider-name-3" value="${q.provider_name_3 || ''}" placeholder="e.g., Elite Services" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
                        </div>
                        <div class="field" style="margin:0;">
                          <label style="font-size:0.7rem;">Provider Phone</label>
                          <input type="text" class="eq-provider-phone-3" value="${q.provider_phone_3 || ''}" placeholder="e.g., 281-555-9999" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
                        </div>
                        <div class="field" style="margin:0;">
                          <label style="font-size:0.7rem;">Est. Schedule/Timeframe</label>
                          <input type="text" class="eq-schedule-3" value="${q.provider_schedule_3 || ''}" placeholder="e.g., Flexible Booking" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
