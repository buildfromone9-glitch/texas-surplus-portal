<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Surplus Property Research Group — Texas Foreclosure Surplus Recovery</title>
<meta name="description" content="Educational public-records research service helping Texans recover unclaimed foreclosure surplus funds held by the Texas Comptroller." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root {
    --ink: #15172b;
    --ink-soft: #2a2d4a;
    --ink-mute: #5a5d75;
    --paper: #faf6ee;
    --paper-deep: #f3ecdc;
    --paper-edge: #e6dcc4;
    --cream: #fffcf5;
    --rule: #d8cdb3;
    --rule-soft: #ebe2cd;
    --gold: #a07f3d;
    --gold-deep: #806530;
    --gold-soft: #c9a85f;
    --rust: #8b3a2a;
    --moss: #3d5c44;
    --shadow: 0 1px 0 rgba(21,23,43,.04), 0 4px 24px -8px rgba(21,23,43,.12);
    --shadow-lift: 0 2px 0 rgba(21,23,43,.05), 0 18px 48px -16px rgba(21,23,43,.22);
    --serif: 'Fraunces', 'Iowan Old Style', 'Georgia', serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
    --content-w: 720px;
    --wide-w: 1100px;
  }

  /* ============================================================
     BASE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at top left, rgba(160,127,61,0.045), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(21,23,43,0.025), transparent 50%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  /* Subtle paper grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.08 0 0 0 0 0.09 0 0 0 0 0.17 0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  #app { position: relative; z-index: 2; }

  h1, h2, h3, h4, h5 {
    font-family: var(--serif);
    font-weight: 400;
    color: var(--ink);
    margin: 0 0 0.5em;
    letter-spacing: -0.01em;
    font-variation-settings: 'SOFT' 50;
  }
  h1 { font-size: clamp(2.2rem, 5.5vw, 4.2rem); line-height: 1.02; letter-spacing: -0.03em; font-weight: 350; }
  h2 { font-size: clamp(1.7rem, 3.5vw, 2.5rem); line-height: 1.1; letter-spacing: -0.02em; }
  h3 { font-size: 1.3rem; line-height: 1.25; }
  h4 { font-size: 1.05rem; line-height: 1.3; font-family: var(--sans); font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; color: var(--ink-soft); }
  p { margin: 0 0 1em; }
  a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--gold); text-underline-offset: 3px; text-decoration-thickness: 1px; transition: color 120ms; }
  a:hover { color: var(--gold-deep); }
  strong { font-weight: 600; color: var(--ink); }
  em { font-style: italic; }
  hr { border: 0; height: 1px; background: var(--rule); margin: 2.5em 0; }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .container { max-width: var(--content-w); margin: 0 auto; padding: 0 1.5rem; }
  .container-wide { max-width: var(--wide-w); margin: 0 auto; padding: 0 1.5rem; }

  /* ============================================================
     HEADER / NAV
     ============================================================ */
  .site-header {
    border-bottom: 1px solid var(--rule);
    background: rgba(250, 246, 238, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .site-header__inner {
    max-width: var(--wide-w);
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: var(--ink);
  }
  .brand__mark {
    width: 38px; height: 38px;
    border: 1px solid var(--ink);
    display: grid; place-items: center;
    font-family: var(--serif);
    font-size: 1.2rem;
    font-style: italic;
    background: var(--cream);
    flex-shrink: 0;
  }
  .brand__name {
    font-family: var(--serif);
    font-size: 1.05rem;
    line-height: 1.1;
    letter-spacing: 0.01em;
  }
  .brand__name small {
    display: block;
    font-family: var(--sans);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    margin-top: 2px;
  }
  .nav-links {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  .nav-links a {
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-soft);
    transition: color 120ms;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .nav-links a.active::after {
    content: '';
    display: block;
    width: 100%; height: 1px;
    background: var(--gold);
    margin-top: 4px;
  }
  @media (max-width: 640px) {
    .nav-links { display: none; }
    .nav-links.show-mobile { display: flex; gap: 0.75rem; }
    .nav-links a { font-size: 0.75rem; }
  }

  /* ============================================================
     HERO
     ============================================================ */
  .hero {
    padding: clamp(3rem, 8vw, 6rem) 1.5rem clamp(2rem, 5vw, 4rem);
    border-bottom: 1px solid var(--rule);
    background:
      linear-gradient(180deg, transparent 0%, rgba(243, 236, 220, 0.4) 100%);
  }
  .hero__inner { max-width: var(--wide-w); margin: 0 auto; }
  .hero__eyebrow {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .hero__eyebrow::before {
    content: '';
    display: block;
    width: 40px; height: 1px;
    background: var(--gold);
  }
  .hero__title {
    max-width: 900px;
    margin-bottom: 1.5rem;
  }
  .hero__title em {
    font-style: italic;
    color: var(--gold-deep);
    font-variation-settings: 'SOFT' 100;
  }
  .hero__lede {
    font-size: clamp(1.1rem, 1.8vw, 1.3rem);
    max-width: 640px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-bottom: 2.5rem;
  }
  .hero__cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
  }

  /* Personalized banner (shown when ?c= present) */
  .personal-banner {
    background: var(--ink);
    color: var(--cream);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    border-radius: 2px;
    max-width: 720px;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow);
  }
  .personal-banner__icon {
    width: 32px; height: 32px;
    border: 1px solid var(--gold-soft);
    display: grid; place-items: center;
    color: var(--gold-soft);
    flex-shrink: 0;
    font-family: var(--serif);
    font-style: italic;
  }
  .personal-banner__text { font-size: 0.95rem; line-height: 1.4; }
  .personal-banner__text strong { color: var(--gold-soft); font-weight: 500; }

  /* ============================================================
     BUTTONS
     ============================================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.95rem 1.6rem;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
    cursor: pointer;
    transition: all 180ms cubic-bezier(.2,.7,.3,1);
    border-radius: 0;
    font-family: var(--sans);
  }
  .btn:hover {
    background: transparent;
    color: var(--ink);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px -4px rgba(21,23,43,.3);
  }
  .btn--ghost {
    background: transparent;
    color: var(--ink);
  }
  .btn--ghost:hover {
    background: var(--ink);
    color: var(--cream);
  }
  .btn--gold {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--cream);
  }
  .btn--gold:hover {
    background: var(--gold-deep);
    border-color: var(--gold-deep);
    color: var(--cream);
  }
  .btn--small {
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }
  .btn__arrow { font-family: var(--serif); font-size: 1.1rem; line-height: 1; }

  /* ============================================================
     SECTIONS
     ============================================================ */
  .section {
    padding: clamp(3rem, 6vw, 5rem) 1.5rem;
  }
  .section--alt { background: var(--paper-deep); border-top: 1px solid var(--rule-soft); border-bottom: 1px solid var(--rule-soft); }
  .section__head {
    max-width: var(--wide-w);
    margin: 0 auto 3rem;
    text-align: left;
  }
  .section__eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-deep);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .section__eyebrow::before {
    content: '';
    display: block;
    width: 32px; height: 1px;
    background: var(--gold);
  }

  /* ============================================================
     STEPS (How it works)
     ============================================================ */
  .steps {
    max-width: var(--wide-w);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    border: 1px solid var(--rule);
    background: var(--cream);
  }
  .step {
    padding: 2rem 1.75rem;
    border-right: 1px solid var(--rule);
    position: relative;
  }
  .step:last-child { border-right: none; }
  .step__num {
    font-family: var(--serif);
    font-size: 3rem;
    line-height: 1;
    color: var(--gold);
    font-style: italic;
    font-variation-settings: 'SOFT' 100;
    margin-bottom: 1rem;
  }
  .step__title {
    font-family: var(--serif);
    font-size: 1.3rem;
    margin-bottom: 0.6rem;
    line-height: 1.2;
  }
  .step__body {
    font-size: 0.92rem;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0;
  }
  @media (max-width: 880px) {
    .step { border-right: none; border-bottom: 1px solid var(--rule); }
    .step:last-child { border-bottom: none; }
  }

  /* ============================================================
     DISCLOSURE BLOCK
     ============================================================ */
  .disclosure {
    max-width: var(--content-w);
    margin: 0 auto;
    padding: 2.25rem 2rem;
    border: 1px solid var(--rule);
    border-left: 4px solid var(--gold);
    background: var(--cream);
    box-shadow: var(--shadow);
  }
  .disclosure h3 {
    font-family: var(--sans);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold-deep);
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .disclosure p { font-size: 0.95rem; line-height: 1.65; color: var(--ink-soft); }
  .disclosure p:last-child { margin-bottom: 0; }
  .disclosure strong { color: var(--ink); }

  /* ============================================================
     FORM
     ============================================================ */
  .form {
    max-width: var(--content-w);
    margin: 0 auto;
    background: var(--cream);
    border: 1px solid var(--rule);
    padding: 2.5rem;
    box-shadow: var(--shadow);
  }
  .form__title {
    font-family: var(--serif);
    font-size: 1.8rem;
    margin-bottom: 0.4rem;
    letter-spacing: -0.01em;
  }
  .form__intro { font-size: 0.95rem; color: var(--ink-soft); margin-bottom: 2rem; }
  .field { margin-bottom: 1.25rem; }
  .field--row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .field--row { grid-template-columns: 1fr; } }
  .field label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 0.85rem 0.9rem;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: var(--sans);
    font-size: 1rem;
    color: var(--ink);
    border-radius: 0;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(160, 127, 61, 0.15);
  }
  .field textarea { min-height: 100px; resize: vertical; }
  .field__hint { font-size: 0.8rem; color: var(--ink-mute); margin-top: 0.3rem; }
  .form__submit { margin-top: 1.5rem; }
  .form__success {
    padding: 1.25rem;
    background: rgba(61, 92, 68, 0.08);
    border-left: 3px solid var(--moss);
    color: var(--moss);
    font-size: 0.95rem;
    margin-top: 1.5rem;
  }

  /* ============================================================
     AGREEMENT VIEW
     ============================================================ */
  .agreement-wrap { max-width: 820px; margin: 0 auto; padding: 0 1.5rem; }
  .agreement-cover {
    padding: 4rem 0 3rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 3rem;
  }
  .agreement-cover__label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 1.5rem;
  }
  .agreement-cover__title {
    font-size: clamp(2rem, 4.5vw, 3.2rem);
    line-height: 1.05;
    margin-bottom: 2rem;
    letter-spacing: -0.025em;
    font-weight: 350;
  }
  .agreement-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem 2rem;
    padding: 1.5rem;
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 2px;
  }
  .agreement-meta__item dt {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    margin-bottom: 0.3rem;
  }
  .agreement-meta__item dd {
    margin: 0;
    font-size: 0.95rem;
    color: var(--ink);
    font-weight: 500;
  }

  .agreement-section { margin-bottom: 2.5rem; }
  .agreement-section h2 {
    font-size: 1.4rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
  }
  .agreement-section h2 .num {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--gold-deep);
    font-weight: 500;
  }
  .agreement-section h3 {
    font-family: var(--sans);
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 600;
    margin: 1.5rem 0 0.6rem;
  }
  .agreement-section p, .agreement-section li {
    font-size: 0.96rem;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .agreement-section ol, .agreement-section ul {
    padding-left: 1.5em;
    margin: 0 0 1em;
  }
  .agreement-section li { margin-bottom: 0.5em; }

  .agreement-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    background: var(--cream);
    border: 1px solid var(--rule);
    font-size: 0.95rem;
  }
  .agreement-table th, .agreement-table td {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--rule-soft);
    text-align: left;
    vertical-align: top;
  }
  .agreement-table th {
    font-family: var(--sans);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    background: var(--paper-deep);
  }
  .agreement-table tr:last-child td { border-bottom: none; }
  .agreement-table .amount { font-family: var(--mono); font-size: 0.95rem; }

  /* Notice block */
  .notice-block {
    padding: 1.5rem 1.75rem;
    background: var(--ink);
    color: var(--cream);
    margin: 2rem 0;
    border-radius: 2px;
  }
  .notice-block h3 {
    color: var(--gold-soft);
    font-family: var(--sans);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 0.75rem;
    font-weight: 600;
  }
  .notice-block p { color: var(--cream); font-size: 0.92rem; margin-bottom: 0; }
  .notice-block strong { color: var(--gold-soft); font-weight: 500; }

  /* ============================================================
     SIGNATURE
     ============================================================ */
  .sig-section {
    margin-top: 4rem;
    padding-top: 3rem;
    border-top: 2px solid var(--ink);
  }
  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.5rem;
    margin-top: 2rem;
  }
  @media (max-width: 720px) { .sig-grid { grid-template-columns: 1fr; } }
  .sig-block h4 {
    margin-bottom: 1rem;
    font-family: var(--sans);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.75rem;
    color: var(--ink-mute);
  }
  .sig-pad {
    border: 1px solid var(--rule);
    background: var(--cream);
    height: 160px;
    position: relative;
    cursor: crosshair;
    touch-action: none;
  }
  .sig-pad canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .sig-pad__placeholder {
    position: absolute;
    bottom: 12px;
    left: 16px;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-mute);
    pointer-events: none;
    font-size: 0.9rem;
  }
  .sig-pad.signed .sig-pad__placeholder { display: none; }
  .sig-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.6rem;
    font-size: 0.8rem;
    color: var(--ink-mute);
  }
  .sig-clear {
    background: none;
    border: none;
    color: var(--rust);
    font-family: var(--sans);
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .sig-static {
    border: 1px solid var(--rule);
    background: var(--cream);
    padding: 1rem;
    min-height: 100px;
    display: flex;
    flex-direction: column;
  }
  .sig-static__sig {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.4rem;
    color: var(--ink);
    flex-grow: 1;
    display: flex;
    align-items: center;
  }
  .sig-static__line {
    border-top: 1px solid var(--ink);
    padding-top: 0.4rem;
    font-size: 0.75rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .agree-confirm {
    margin: 2.5rem 0 1.5rem;
    padding: 1.5rem;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    display: flex;
    gap: 0.85rem;
    align-items: flex-start;
  }
  .agree-confirm input[type="checkbox"] {
    width: 20px; height: 20px;
    margin-top: 2px;
    accent-color: var(--gold);
    cursor: pointer;
    flex-shrink: 0;
  }
  .agree-confirm label { font-size: 0.92rem; line-height: 1.55; cursor: pointer; color: var(--ink-soft); }
  .agree-confirm label strong { color: var(--ink); }

  /* ============================================================
     GUIDE / DOC VIEW
     ============================================================ */
  .doc {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }
  .doc__cover {
    padding: 4rem 0 3rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 3rem;
  }
  .doc__cover-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-deep);

  loadClient() {
    const params = new URLSearchParams(window.location.search);
    const c = params.get('c');
    if (c) {
      try {
        const decoded = atob(c.replace(/-/g, '+').replace(/_/g, '/'));
        this.state.client = JSON.parse(decodeURIComponent(escape(decoded)));
      } catch (e) {
        console.warn('Failed to parse client param', e);
      }
    }
  },

  loadSignedState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // Only load if it's for this same client (by trackingId)
        const currentTrk = this.state.client?.trackingId || 'guest';
        if (parsed.trackingId === currentTrk) {
          this.state.signature = parsed.signature;
          this.state.typedName = parsed.typedName;
          this.state.signedAt = parsed.signedAt;
        }
      }
    } catch (e) {
      console.warn('Failed to load signed state', e);
    }
  },

  saveSignedState() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        trackingId: this.state.client?.trackingId || 'guest',
        signature: this.state.signature,
        typedName: this.state.typedName,
        signedAt: this.state.signedAt,
      }));
    } catch (e) { console.warn('Save failed', e); }
  },

  hasSigned() {
    return !!(this.state.signature && this.state.typedName && this.state.signedAt);
  },

    bindHandlers(route);
    window.scrollTo(0, 0);
  },
};

          <li><a href="#s7">Common Pitfalls &amp; What Slows Claims Down</a></li>
          <li><a href="#s8">What to Expect — Timeline</a></li>

      <section class="doc__section" id="s1">
        <div class="doc__section-num">Section 01</div>
        <h2>Welcome &amp; How to Use This Packet</h2>
        <p>If your Texas home went to a mortgage or bank foreclosure sale, and the property sold for more than what you owed, that extra money — the surplus — belongs to you under Texas law. After a waiting period, unclaimed surplus funds are turned over to the <strong>Texas Comptroller of Public Accounts, Unclaimed Property Division</strong>, where they sit until the rightful owner files a claim.</p>
        <p>This packet exists for one purpose: to give you a clear, accurate, plain-English roadmap so you can claim your money directly from the State of Texas, on your own, through the State's free portal at <strong>claimittexas.gov</strong>.</p>
        <h3>What this packet is</h3>
        <ul>
          <li>An educational guide explaining the State's standard claim process.</li>
          <li>A checklist of the documents the State will most often ask for.</li>
          <li>A set of pitfalls to help you avoid the common mistakes that slow claims down or get them denied.</li>
          <li>A reference for your obligations under the service agreement you signed with SPRG.</li>

        <h3>What this packet is not</h3>
        <ul>
          <li>It is <strong>not legal advice</strong>. SPRG is not your lawyer.</li>
          <li>It is not a substitute for the Texas Comptroller's own instructions. If the State's portal tells you something different from this packet, follow the State.</li>
          <li>It does not authorize SPRG to file, sign, or submit any claim form on your behalf. You — or your lawful attorney-in-fact or legal representative — must file the claim yourself.</li>
        </ul>
        <div class="callout">
          <strong>How to Read This Packet</strong>
          Start with Section 02 (Your Rights). Then read Section 04 (The Recovery Process) straight through before you begin. The State's portal is straightforward, but small mistakes early on — wrong claimant type, missing document, mismatched name — can add weeks of delay. A slow read now saves time later.

      <section class="doc__section" id="s2">

        <h3>Your right to claim directly &amp; for free</h3>
        <p>The State of Texas does not charge a fee to return unclaimed property. You have the absolute legal right to search for, and claim, these funds yourself, at no cost, through the official state database at <strong>claimittexas.gov</strong>, without hiring SPRG and without signing any agreement. <strong>You are not required to use SPRG's service to recover funds the State is holding for you.</strong></p>
        <h3>What that means in practice</h3>
        <p>You signed a service agreement with SPRG because the research and the step-by-step roadmap have value to you. That's fine — many people prefer not to navigate state databases and document requirements on their own. But you should know exactly what you are paying for and what you are not:</p>

            <h4>You are NOT paying SPRG for</h4>

        <h2>Background: What Surplus Funds Are &amp; How They Got to the State</h2>
        <h3>The short version</h3>
        <p>When a mortgage lender forecloses on a Texas home and sells it at auction, the sale price is sometimes higher than what the borrower owed — the unpaid loan balance, interest, late fees, attorney's fees, and trustee costs. The extra money is called the surplus (sometimes "excess proceeds").</p>
        <h3>Where the money goes — the path</h3>
        <ol>
          <li><strong>Foreclosure sale.</strong> The substitute trustee conducts the sale. After paying senior debts and costs, any leftover money is the surplus.</li>
          <li><strong>Held by the trustee or court.</strong> The trustee may hold the surplus for a period of time, or — depending on circumstances — deposit it into the county court registry.</li>
          <li><strong>Reported to the State.</strong> If the surplus is not claimed by the former owner within the abandonment period (generally one to three years, depending on the property type), the holder is required by Chapter 74 of the Texas Property Code to remit it to the Comptroller.</li>
          <li><strong>Held by the Comptroller.</strong> The Comptroller holds the funds indefinitely until the rightful owner claims them. The money does not expire and does not get "absorbed" by the State.</li>

        </div>

        <p>Generally, the surplus belongs to the former owner of record at the time of the foreclosure. Other parties may also have rights — junior lienholders, judgment creditors, ex-spouses with community-property interests, or, if the former owner has since passed away, the owner's heirs. The Comptroller verifies entitlement during the claim review.</p>
        <h3>Why hire SPRG at all?</h3>
        <p>Two reasons. First, many former owners don't know the State is holding money for them — and even if they checked claimittexas.gov, they may not recognize the entry because the reporting holder lists the property under names and addresses they no longer use. SPRG matches public records to your information so you know the funds exist. Second, the State's documentation requirements can be confusing the first time through. This guide demystifies them.</p>

        ${stepCard(1, 'Verify Your Property Record', '5 minutes', `

          <p>The portal will ask how you are related to the reported owner. The most common choices are:</p>
          <ul>
            <li><strong>Owner</strong> — you are the person whose name appears on the record (the former property owner).</li>
            <li><strong>Heir / Personal Representative</strong> — the original owner has passed away and you are inheriting or administering the estate. (See Section 06 for what's required.)</li>
            <li><strong>Authorized Representative</strong> — you hold a power of attorney for the owner, or are a legal guardian, conservator, or attorney-in-fact.</li>
          </ul>
          <p>Pick the option that accurately describes your relationship. Choosing "Owner" when you are actually an heir is the single most common reason a claim gets denied and has to be refiled.</p>
        `)}

        ${stepCard(4, 'Enter Your Personal Information', '10 minutes', `
          <p>The portal will ask for your current legal name, current address, phone, and email, plus identifiers the State uses to verify you. Be exact — use your legal name as it appears on your driver's license or state ID, not a nickname.</p>
          <p>If your name has changed since the foreclosure (marriage, divorce, court order), make a note of it. You will likely need to provide a marriage certificate, divorce decree, or court order in Step 6 to bridge the old name to the new.</p>
        `)}

        ${stepCard(5, 'Generate &amp; Review the Claim Form', '20 minutes', `
          <p>The portal will generate the official State of Texas claim form, pre-filled with the information you entered. <strong>Download it. Print it. Read it carefully.</strong></p>
          <ul>
            <li>Check that every field is correct — name spelling, address, property ID, claimed amount.</li>
            <li>Sign in the locations indicated on the form. Use your full legal signature in blue or black ink.</li>
            <li><strong>Notarization:</strong> For higher-dollar claims (the State sets the threshold and may update it), the form requires your signature to be notarized by a licensed Texas notary public. If your form says "notarize," do not skip this — an unnotarized form when notarization was required will bounce.</li>
          </ul>
          <div class="callout"><strong>Where to Get Notarized</strong>Most banks notarize for free if you are an account holder. UPS Stores, FedEx Office, AAA offices, and many public libraries also offer notary services for a small fee. Bring photo ID.</div>
        `)}

        ${stepCard(6, 'Gather Your Supporting Documents', '1–3 days', `
          <p>The State will tell you exactly which documents are required for your specific claim. The list depends on claim type (owner vs heir) and dollar amount. The full checklist is in Section 05 of this packet.</p>
          <p>Make clean, legible copies of every document. Originals stay with you unless the State specifically directs otherwise (rare). PDFs scanned at 300 dpi are ideal for the upload portal.</p>
        `)}

        ${stepCard(7, 'Submit Your Claim to the State', '30 minutes', `
          <p>You have two options. Use online submission whenever possible — it is faster, trackable, and reduces the chance of lost paperwork.</p>
          <h4>Option A — Online (recommended)</h4>
          <ul>
            <li>Return to your claim on claimittexas.gov.</li>
            <li>Upload your signed claim form and every required document through the secure upload portal.</li>
            <li>Save the claim number / tracking number the State assigns. Write it down. Keep it.</li>
          </ul>
          <h4>Option B — By mail</h4>
          <p>Send your signed (and, if required, notarized) claim form and copies of all supporting documents by certified mail, return receipt requested, to:</p>
          <p style="font-family:var(--serif); font-style:italic; padding-left:1rem; border-left:2px solid var(--gold); margin:1rem 0;">
            Texas Comptroller of Public Accounts<br/>
            Unclaimed Property Division<br/>
            P.O. Box 12019<br/>
            Austin, TX 78711-2019
          </p>
          <div class="callout"><strong>Keep Copies of Everything</strong>Before you submit (online or by mail), make a complete copy of the full claim packet for your own records. Keep it for at least seven years.</div>
        `)}

        ${stepCard(8, 'Respond Promptly to Any State Requests', 'As needed', `
          <p>The Comptroller's examiner may email or mail you asking for additional documentation, clarification, or a corrected form. Respond within the timeframe the State specifies (<strong>typically 30 days</strong>). Unanswered requests are the second-most-common reason claims stall.</p>
          <p>Check the email account you registered with the portal at least twice a week, including the spam folder, while your claim is pending. Notifications often come from a "@cpa.texas.gov" address.</p>
        `)}

        ${stepCard(9, 'Receive Disbursement &amp; Notify SPRG', 'Same day', `
          <p>When the State approves your claim, you will receive payment — by check mailed to your address on file, or in some cases by ACH direct deposit. The amount will be the gross surplus less any State-imposed offsets (such as outstanding child-support liens, tax liens, or other statutory deductions).</p>
          <div class="callout callout--warn"><strong>Required by Your Agreement</strong>You must notify SPRG in writing within <strong>three (3) business days</strong> after you receive (or are notified of) any disbursement. Email to SPRG's address on file is sufficient. Include the disbursement date, gross amount received, and method of payment (check or ACH). See Section 09 for the full obligation.</div>
        `)}
      </section>

      <section class="doc__section" id="s5">
        <div class="doc__section-num">Section 05</div>
        <h2>Required Documents Checklist</h2>
        <p>The State of Texas customizes the document list to each claim. The categories below cover what the Comptroller most commonly requires for a former-owner foreclosure-surplus claim. <strong>Always follow the exact list shown to you on the portal.</strong></p>

        <h3>Identity verification</h3>
        <ul>
          <li><strong>Government-issued photo ID.</strong> Texas driver's license, Texas ID card, U.S. passport, or military ID. Must be current (not expired).</li>
          <li><strong>Proof of Social Security Number.</strong> A photocopy of your Social Security card is best. The State may also accept a redacted W-2, redacted SSA benefits statement, or other SSA-issued document showing your full SSN. Black out everything except your name and SSN.</li>
          <li><strong>Proof of current address.</strong> Recent utility bill, bank statement, lease, or property tax statement showing your current mailing address (within the last 60–90 days).</li>
        </ul>

        <h3>Proof of former ownership of the foreclosed property</h3>
        <p>You need to connect your identity today to your ownership of the property at the time of foreclosure. Provide at least one — ideally two — of the following:</p>
        <ul>
          <li>Recorded deed showing you as grantee at the property address (county clerk's office has copies).</li>
          <li>Old mortgage statement from the lender that foreclosed, in your name at the property address.</li>
          <li>Property tax statement from the appraisal district, in your name at the property address (CAD records are public and free).</li>
          <li>Closing / settlement statement (HUD-1 or Closing Disclosure) from when you purchased the property.</li>
          <li>Foreclosure notice or trustee's deed mailed to you at the property address.</li>
          <li>Utility bill (electric, water, gas) in your name at the property address from any month you lived there.</li>
        </ul>

        <h3>Name-change bridging documents (only if your name has changed)</h3>
        <ul>
          <li><strong>Marriage certificate</strong> — connects maiden name to married name.</li>
          <li><strong>Divorce decree</strong> — if your divorce restored a previous name.</li>
          <li><strong>Court order changing name</strong> — for any other legal name change.</li>
        </ul>

        <div class="callout"><strong>Pro Tip</strong>The Comptroller's examiners are humans with a checklist. Make their job easy: clear scans, every page right-side-up, no glare, no cut-off corners. A neat packet gets approved faster than a sloppy one with the same information.</div>
      </section>

      <section class="doc__section" id="s6">
        <div class="doc__section-num">Section 06</div>
        <h2>Special Situation — Claiming as an Heir</h2>
        <p>If the former owner has passed away, the surplus belongs to that person's estate, and you can claim it as an heir, executor, or personal representative. <strong>Heir claims are more involved than owner claims</strong> — plan on extra time and expect the State to scrutinize the supporting documents carefully.</p>
        <h3>What you'll need on top of the regular checklist</h3>
        <table class="doc__table">
          <thead>
            <tr><th>Situation</th><th>Documents You'll Likely Need</th></tr>
          </thead>
          <tbody>
            <tr><td><strong>Probated will exists</strong></td><td>Certified copy of the will, Order Admitting Will to Probate, Letters Testamentary issued to the executor.</td></tr>
            <tr><td><strong>Estate opened but no will</strong></td><td>Letters of Administration issued by the probate court, court order identifying the heirs.</td></tr>
            <tr><td><strong>No estate opened (small estate)</strong></td><td>Affidavit of Heirship meeting Texas requirements (typically signed by two disinterested witnesses with personal knowledge of the family history), recorded at the county clerk's office where the property is located.</td></tr>
            <tr><td><strong>All heirs claiming</strong></td><td>Original owner's death certificate (certified copy), proof of identity for each claiming heir, and (if applicable) a written agreement among heirs on how to split the funds.</td></tr>
          </tbody>
        </table>
        <div class="callout callout--warn"><strong>Consult a Texas Attorney</strong>Affidavits of Heirship, probate filings, and disputes among heirs are areas where small mistakes cause big delays — or permanently forfeit the funds to another claimant. If you are claiming as an heir, especially if the surplus is substantial, the cost of an hour of a Texas probate attorney's time is usually money well spent.</div>
        <h3>If multiple heirs may claim</h3>
        <p>SPRG will not knowingly enter a service agreement with more than one claimant for the same Property ID. If competing heirs surface during your claim, your service agreement allows SPRG to withdraw — and you will owe SPRG nothing for the work already done. Your right to claim from the State, of course, continues regardless.</p>
      </section>

      <section class="doc__section" id="s7">
        <div class="doc__section-num">Section 07</div>
        <h2>Common Pitfalls &amp; What Slows Claims Down</h2>
        <p>Most foreclosure surplus claims are approved. The ones that get denied, or sit in limbo for months, usually fail for predictable reasons. Knowing what they are is half the battle.</p>
        <h3>1. Wrong claimant type selected</h3>
        <p>Choosing "Owner" when you should have chosen "Heir/Representative" (or vice versa) almost always triggers a denial. Re-read Step 3 and pick the option that accurately describes you.</p>
        <h3>2. Name mismatch with no bridging document</h3>
        <p>If the property record lists "Maria Garcia" but your ID says "Maria Lopez," you need a marriage certificate or court order tying the names together. Without it, the examiner cannot confirm you're the same person.</p>
        <h3>3. Address that doesn't connect you to the property</h3>
        <p>Some claimants try to prove ownership using utility bills from a current address — which doesn't help. You need at least one document showing your name at the foreclosed property's address.</p>
        <h3>4. Illegible or partial scans</h3>
        <p>Dark, blurry, or cropped scans get flagged. Use a flatbed scanner if you can, or a phone scanning app (CamScanner, Adobe Scan, Apple Notes) with shadows controlled and the whole document in frame.</p>
        <h3>5. Missing notarization on a high-dollar form</h3>
        <p>If the form says "notarize," the form must be notarized. The State will not accept a workaround.</p>
        <h3>6. Ignoring the State's follow-up email</h3>
        <p>If the examiner emails asking for one more document and you don't respond within 30 days, your claim may be administratively closed. Check the email account on file at least twice a week.</p>
        <h3>7. Falling for impersonator websites or third-party "filers"</h3>
        <p>The State never charges to return your money. Anyone who tells you otherwise — including a website you found through a search ad — is not the State. Always type claimittexas.gov directly into your browser.</p>
        <h3>8. Liens you didn't know about</h3>
        <p>The State may offset child-support arrears, state tax debts, or other statutory liens from your disbursement. This isn't an error and isn't reviewable through the claims process — it's a separate state-law procedure. Your 10% fee to SPRG, by contrast, is calculated only on the net amount actually disbursed to you, not the gross.</p>
      </section>

      <section class="doc__section" id="s8">
        <div class="doc__section-num">Section 08</div>
        <h2>What to Expect — Timeline</h2>
        <p>Texas processing times vary by claim type, dollar amount, and the State's workload. The chart below is a realistic estimate — not a guarantee. Heir claims and high-dollar claims sit at the longer end of the range; clean owner claims of modest amounts can move quickly.</p>
        <ul class="timeline">
          <li>
            <div class="timeline__when">Day 0</div>
            <div class="timeline__what"><strong>You submit your claim</strong> on claimittexas.gov with all required documents. The portal assigns you a claim / tracking number — write it down.</div>
          </li>
          <li>
            <div class="timeline__when">Days 1–7</div>
            <div class="timeline__what"><strong>Initial intake review.</strong> The Comptroller's office confirms your packet is complete on its face. If anything is missing or unclear, expect an email asking for it.</div>
          </li>
          <li>
            <div class="timeline__when">Weeks 2–6</div>
            <div class="timeline__what"><strong>Examiner review.</strong> A claims examiner verifies your identity, your ownership of the foreclosed property, and that no competing claim is on file. They may request additional documents during this stage — respond promptly.</div>
          </li>
          <li>
            <div class="timeline__when">Weeks 4–12 (typical)</div>
            <div class="timeline__what"><strong>Approval &amp; disbursement.</strong> Once approved, the State issues payment by check (mailed to your address on file) or ACH. Simple owner claims often resolve toward the shorter end; heir or contested claims toward the longer end.</div>
          </li>
          <li>
            <div class="timeline__when">Within 3 business days of receipt</div>
            <div class="timeline__what"><strong>You notify SPRG</strong> in writing of the disbursement. (Required by your service agreement — see Section 09.)</div>
          </li>
          <li>
            <div class="timeline__when">Within 10 business days of receipt</div>
            <div class="timeline__what"><strong>You pay SPRG's 10% contingency service fee</strong> on the net amount actually disbursed to you, per the invoice SPRG sends.</div>
          </li>
        </ul>
        <div class="callout"><strong>If Things Stall</strong>If your claim has been pending for more than 90 days with no contact from an examiner, you can check status by calling the Unclaimed Property Division directly (number listed on claimittexas.gov) or by logging back into the portal. SPRG cannot check status on your behalf — that requires identifying yourself to the State.</div>
      </section>

      <section class="doc__section" id="s9">
        <div class="doc__section-num">Section 09</div>
        <h2>Your Obligations Under the Service Agreement</h2>
        <p>You signed a Texas Surplus Property Research Service Agreement with SPRG. This section summarizes your ongoing duties under that agreement. It is a plain-English recap — the agreement itself controls in any conflict.</p>
        <h3>1. File the claim yourself</h3>
        <p>SPRG is legally prohibited from filing on your behalf under Tex. Prop. Code § 74.507(b). You — or your lawful attorney-in-fact or legal representative — must complete, sign, and submit every claim form.</p>
        <h3>2. Notify SPRG of disbursement within 3 business days <span style="font-family:var(--mono); font-size:0.7em; color:var(--rust); letter-spacing:0.1em;">— MATERIAL</span></h3>
        <p>When the State pays you, you must notify SPRG in writing within <strong>three (3) business days</strong>. Email to SPRG's address on file is sufficient. Include:</p>
        <ul>
          <li>The date of disbursement.</li>
          <li>The gross amount you received.</li>
          <li>The method of payment (check, ACH, or otherwise).</li>
        </ul>
        <p>This obligation is a <strong>material term</strong> of your agreement. Skipping it is a breach, even if you intend to pay the fee later.</p>
        <h3>3. Pay the 10% contingency service fee within 10 business days</h3>
        <p>SPRG will email you a written invoice. Payment is due within 10 business days of your receipt of disbursement. The fee is 10% of the gross amount actually disbursed to you — not the originally estimated amount, and not any portion the State offset for liens or other statutory deductions.</p>
        <h3>4. Notice-and-cure if payment is missed</h3>
        <p>If you fail to remit timely payment, SPRG will send you a written demand letter. Under your agreement, the demand letter is valid only if sent both:</p>
        <ol>
          <li>By email to your email address on file, and</li>
          <li>By certified U.S. mail, return receipt requested, to your last known mailing address.</li>
        </ol>
        <p>You then have <strong>fifteen (15) days</strong> from the date the demand letter is sent to cure the default before SPRG may pursue further remedies. (Note: not picking up the certified mail does not invalidate the notice, so long as both methods of delivery were used.)</p>
        <h3>5. Keep your contact info current</h3>
        <p>If you change your email or mailing address between signing the agreement and being paid, let SPRG know. The notices above are sent to the address on file at the time they are sent.</p>
        <div class="callout"><strong>Reminder</strong>This section is a summary. The signed Service Agreement is the controlling document. Read it again before disbursement, and consult a Texas attorney if anything is unclear.</div>
      </section>

      <section class="doc__section" id="s10">
        <div class="doc__section-num">Section 10</div>
        <h2>Frequently Asked Questions</h2>
        <div class="faq__item"><h3 class="faq__q">Do I really have to file the claim myself? Can't SPRG just do it?</h3><p class="faq__a"><strong>No, SPRG cannot file for you.</strong> Texas Property Code § 74.507(b) prohibits a finder from filing or receiving a claim form on a claimant's behalf. Even if SPRG wanted to, the law forbids it. You must file the claim — or have your lawful attorney-in-fact or legal representative file — yourself.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if the State pays less than the amount listed in my packet?</h3><p class="faq__a">It happens — the State may apply offsets for tax debts, child-support liens, or other statutory deductions, and processing adjustments are common. SPRG's 10% fee is calculated only on the amount actually disbursed to you, not on the original estimate.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if the State denies my claim entirely?</h3><p class="faq__a">You owe SPRG nothing. Your service agreement terminates automatically when the Comptroller closes the file without disbursement. You can also refile if the denial was due to a fixable issue (missing document, wrong claimant type), and SPRG's research remains useful — though a new agreement may be required if substantial new work is needed.</p></div>
        <div class="faq__item"><h3 class="faq__q">How long does this really take?</h3><p class="faq__a">For a clean owner claim with all documents in order: typically <strong>4–8 weeks</strong> from submission to disbursement. For heir claims or claims requiring extra documentation: <strong>2–6 months or longer</strong>. The State does not commit to a deadline; respond fast to their requests and your claim moves faster.</p></div>
        <div class="faq__item"><h3 class="faq__q">Can SPRG check on my claim status?</h3><p class="faq__a">No. The Comptroller's office discusses claim status only with the claimant or their authorized representative. You can check status by logging into your account at claimittexas.gov or by calling the Unclaimed Property Division directly.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if I want to back out and file on my own?</h3><p class="faq__a">You can terminate the service agreement at any time before you submit a claim using SPRG's information — no fee, no penalty. Just notify SPRG in writing (email is fine). After you've submitted using SPRG's information, the 10% fee is still owed if the claim is paid.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if I find money under my name that wasn't in SPRG's research?</h3><p class="faq__a">Money the State is holding under your name that SPRG did not identify and disclose to you is not covered by your service agreement, and no fee is owed on it. You can claim it directly from the State for free, like any owner.</p></div>
        <div class="faq__item"><h3 class="faq__q">Is the 10% fee taxable income to SPRG, deductible by me?</h3><p class="faq__a">Tax questions are case-specific. SPRG does not give tax advice. Talk to a CPA or tax professional, especially if the disbursement is large.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if I die before the claim is paid?</h3><p class="faq__a">The claim becomes part of your estate. Your executor or heirs would need to substitute themselves into the claim, providing the documents listed in Section 06. Your service agreement with SPRG also binds your estate up to the 10% fee on any amount eventually disbursed.</p></div>
        <div class="faq__item"><h3 class="faq__q">Who do I contact at SPRG with questions?</h3><p class="faq__a">Use the contact information in the footer of this page. SPRG can answer process and research questions. <strong>SPRG cannot give legal advice, file your claim, or talk to the State on your behalf.</strong></p></div>
      </section>

      <div class="no-print" style="margin-top:4rem; text-align:center;">
        <button class="btn btn--ghost" onclick="window.print()">Print or Save Guide as PDF</button>
      </div>
    </main>
  `;
}

   ============================================================ */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function formatMoney(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '$ ______________';
  const num = Number(n);
  return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function stepCard(num, title, time, body) {
  const n = String(num).padStart(2, '0');
  return `
    <div class="step-card">
      <div class="step-card__header">
        <span class="step-card__num">${n}</span>
        <h3 class="step-card__title">${title}</h3>
        <span class="step-card__time">${time}</span>
      </div>
      <div class="step-card__body">${body}</div>
    </div>
  `;
}

function b64encJson(obj) {
  const json = JSON.stringify(obj);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return b64.replace(/\+/g, '-').replace(/\//g, '_');
}

      <input type="checkbox" id="confirm-box" />
      <label for="confirm-box">
        <strong>I have read and understood</strong> the Required Consumer Disclosure and the entirety of this Agreement, including my right to claim the funds directly from the State of Texas at no cost without using SPRG. I am signing voluntarily and authorize SPRG to perform the research services described in § 2.
      </label>
    </div>

    <div class="hero__cta-row" style="margin-top:2rem;">
      <button type="button" class="btn" id="sign-submit" disabled>Sign &amp; Continue to Claims Guide <span class="btn__arrow">→</span></button>
    </div>

    <p id="sign-error" style="color:var(--rust); margin-top:1rem; font-size:0.9rem; display:none;"></p>
  `;

  setupSignaturePad();
  setupSignSubmit();
}

function setupSignaturePad() {
  const pad = document.getElementById('sig-pad');
  const canvas = document.getElementById('sig-canvas');
  const clearBtn = document.getElementById('sig-clear');
  if (!pad || !canvas) return;

  const ctx = canvas.getContext('2d');
  let drawing = false;
  let hasInk = false;

  function resize() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = pad.offsetWidth * ratio;
    canvas.height = pad.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.strokeStyle = '#15172b';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();
  window.addEventListener('resize', resize);

  function getPos(e) {
    const rect = pad.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top,
    };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if (!hasInk) {
      hasInk = true;
      pad.classList.add('signed');
    }
  }
  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
  }

  pad.addEventListener('mousedown', start);
  pad.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  pad.addEventListener('touchstart', start, { passive: false });
  pad.addEventListener('touchmove', move, { passive: false });
  pad.addEventListener('touchend', end, { passive: false });

  clearBtn?.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasInk = false;
    pad.classList.remove('signed');
    updateSubmitState();
  });

  // Update submit button state on signature change
  const observer = new MutationObserver(updateSubmitState);
  observer.observe(pad, { attributes: true, attributeFilter: ['class'] });
}

function setupSignSubmit() {
  const typedInput = document.getElementById('typed-name');
  const confirmBox = document.getElementById('confirm-box');
  const submit = document.getElementById('sign-submit');
  const emailInput = document.getElementById('sign-email');

  [typedInput, confirmBox, emailInput].forEach(el => {
    el?.addEventListener('input', updateSubmitState);
    el?.addEventListener('change', updateSubmitState);
  });

  submit?.addEventListener('click', () => {
    const errEl = document.getElementById('sign-error');
    const pad = document.getElementById('sig-pad');
    const canvas = document.getElementById('sig-canvas');
    const typedName = typedInput.value.trim();

    if (!pad.classList.contains('signed')) {
      errEl.textContent = 'Please draw your signature in the box above.';
      errEl.style.display = 'block';
      return;
    }
    if (typedName.length < 3) {
      errEl.textContent = 'Please type your full legal name to confirm your signature.';
      errEl.style.display = 'block';
      return;
    }
    if (!confirmBox.checked) {
      errEl.textContent = 'Please check the confirmation box to agree to the terms.';
      errEl.style.display = 'block';
      return;
    }

    App.state.signature = canvas.toDataURL('image/png');
    App.state.typedName = typedName;
    App.state.signedAt = new Date().toISOString();
    App.saveSignedState();

    // Re-render and route to guide
    window.location.hash = '#/guide';
    App.render();
  });
}

function updateSubmitState() {
  const submit = document.getElementById('sign-submit');
  if (!submit) return;
  const pad = document.getElementById('sig-pad');
  const typed = document.getElementById('typed-name');
  const confirm = document.getElementById('confirm-box');
  const ready = pad?.classList.contains('signed')
             && typed?.value.trim().length >= 3
             && confirm?.checked;
  submit.disabled = !ready;
}

function bindHandlers(route) {
  if (route === 'agreement' && !App.hasSigned()) {
    initSignatureArea();
  }

  if (route === 'landing') {
    const form = document.getElementById('search-form-el');
    form?.addEventListener('submit', (e) => {
      const data = new FormData(form);
      const successEl = document.getElementById('form-success');
      successEl.innerHTML = `<strong>Request received.</strong> Thank you, ${esc(data.get('fullName'))}. If we identify a matching property, we'll email ${esc(data.get('email'))} within 3–5 business days with a personalized service packet. There is no charge for the search.`;
      successEl.style.display = 'block';
      // NOTE: To wire this up for real, POST to your backend, Formspree, or a webhook here.
      form.reset();
      successEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  if (route === 'admin') {
    const form = document.getElementById('admin-form');
    form?.addEventListener('submit', (e) => {
      e.preventDefault();
      const payload = {
        claimantName: document.getElementById('a-name').value.trim(),
        trackingId:   document.getElementById('a-trk').value.trim(),
        dateIssued:   document.getElementById('a-issued').value.trim(),
        propertyId:   document.getElementById('a-pid').value.trim(),
        reportedOwnerName: document.getElementById('a-owner').value.trim(),
        reportedAddress: document.getElementById('a-addr').value.trim(),
        reportingHolder: document.getElementById('a-holder').value.trim(),
        estimatedValue: parseFloat(document.getElementById('a-value').value) || null,
        dateResearched: document.getElementById('a-researched').value.trim(),
      };
      const encoded = b64encJson(payload);
      const baseUrl = window.location.origin + window.location.pathname;
      const fullUrl = `${baseUrl}?c=${encoded}#/`;

      const result = document.getElementById('admin-result');
      result.style.display = 'block';
      result.innerHTML = `
        <div class="admin__output">
          <div class="admin__output-label">Personalized Client URL</div>
          <div id="generated-url" style="user-select:all;">${esc(fullUrl)}</div>
        </div>
        <div class="admin__actions">
          <button class="btn btn--small" onclick="copyToClipboard('${fullUrl.replace(/'/g, "\\'")}', this)">Copy URL</button>
          <a class="btn btn--small btn--gold" href="mailto:?subject=${encodeURIComponent('Your Texas Surplus Property Research Packet — Tracking ' + payload.trackingId)}&body=${encodeURIComponent('Hello ' + payload.claimantName + ',\n\nYour personalized SPRG service packet is ready for review. Please use the link below to view your service agreement and, after signing, access the educational claims guide.\n\n' + fullUrl + '\n\nThe link is unique to your case. If you have questions before signing, reply to this email or call us.\n\n— Surplus Property Research Group')}">Email to Client</a>
          <a class="btn btn--small btn--ghost" href="${fullUrl}" target="_blank">Preview as Client</a>
        </div>
        <p style="margin-top:1.5rem; font-size:0.85rem; color:var(--ink-mute); line-height:1.5;">Send this URL to the client by email or text. When they open it, they'll see a personalized welcome on the landing page and a fully filled-in agreement ready for signature. After signing, they automatically gain access to the full educational claims guide.</p>
      `;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Copied ✓';
    setTimeout(() => { btn.textContent = original; }, 1800);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied ✓';
  });
}
