<script>
  /**
   * VORVO SELF-HEALING & ERROR RECOVERY SYSTEM
   * This script runs first to catch fatal errors and prevent the "Black Screen of Death".
   */
  window.addEventListener('error', function(event) {
    // If it's a syntax error in the main script, the app won't load.
    // We show the recovery UI immediately.
    console.error('Fatal App Error:', event.error);
    displayCrashRecovery(event.error);
  });

  window.addEventListener('unhandledrejection', function(event) {
    console.error('Unhandled Promise Rejection:', event.reason);
    // Optional: show recovery for promise rejections
  });

  function displayCrashRecovery(error) {
    // Wait for DOM to be ready if it's not
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => _show(error));
    } else {
      _show(error);
    }

    function _show(err) {
      const recoveryEl = document.getElementById('crash-recovery');
      const appEl = document.getElementById('app');
      if (recoveryEl) {
        if (appEl) appEl.style.display = 'none';
        recoveryEl.style.display = 'flex';
        const msgEl = document.getElementById('crash-message');
        if (msgEl && err) msgEl.textContent = err.message || err;
      }
    }
  }

  function runSelfRepair() {
    console.log('Running self-repair...');
    // Clear potentially corrupt state
    localStorage.clear();
    sessionStorage.clear();
    // Force reload ignoring cache
    window.location.reload(true);
  }
</script>

<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root {
    --ink: #FFFFFF;
    --ink-soft: #D8D8D8;
    --ink-mute: #888888;
    --paper: #181818;
    --paper-deep: #111111;
    --paper-edge: #222222;
    --cream: #141414;
    --rule: #FFCC00;
    --rule-soft: #222222;
    --gold: #FFCC00;
    --gold-deep: #B88A00;
    --gold-soft: #FFE066;
    --rust: #FF3333;
    --moss: #00CC66;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
    --shadow-lift: 0 8px 32px rgba(0,0,0,0.8);
    --serif: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
    --content-w: 720px;
    --wide-w: 1100px;
  }

  /* ============================================================
     BASE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper-deep);
    background-image:
      radial-gradient(ellipse at top left, rgba(255,204,0,0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(255,204,0,0.02), transparent 50%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  /* Subtle paper grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.08 0 0 0 0 0.09 0 0 0 0 0.17 0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  #app { position: relative; z-index: 2; }

  /* ============================================================
     CRASH RECOVERY UI
     ============================================================ */
  #crash-recovery {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #111111;
    display: none; /* Hidden by default */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    font-family: var(--sans);
    color: #ffffff;
  }
  .crash-card {
    max-width: 500px;
    background: #181818;
    border: 1px solid #FFCC00;
    padding: 3rem;
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .crash-icon {
    width: 80px;
    height: 80px;
    margin-bottom: 1.5rem;
    color: #FFCC00;
  }
  .crash-title {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 1rem;
    color: #FFCC00;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .crash-text {
    color: #D8D8D8;
    margin-bottom: 2rem;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .crash-details {
    background: #000;
    padding: 1rem;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 2rem;
    text-align: left;
    max-height: 100px;
    overflow: auto;
    border-left: 2px solid #FF3333;
  }
  .repair-btn {
    background: #FFCC00;
    color: #000;
    border: none;
    padding: 1rem 2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 100ms;
  }
  .repair-btn:hover {
    background: #FFE066;
    transform: translateY(-2px);
  }

  h1, h2, h3, h4, h5 {
    font-family: var(--serif);
    font-weight: 800;
    color: var(--ink);
    margin: 0 0 0.5em;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  h1 { font-size: clamp(2.2rem, 5.5vw, 4.2rem); line-height: 1.02; letter-spacing: -0.03em; font-weight: 900; }
  h2 { font-size: clamp(1.7rem, 3.5vw, 2.5rem); line-height: 1.1; letter-spacing: -0.02em; }
  h3 { font-size: 1.3rem; line-height: 1.25; }
  h4 { font-size: 1.05rem; line-height: 1.3; font-family: var(--sans); font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold); }
  p { margin: 0 0 1em; }
  a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--gold); text-underline-offset: 3px; text-decoration-thickness: 1px; transition: color 120ms; }
  a:hover { color: var(--gold-deep); }
  strong { font-weight: 600; color: var(--ink); }
  em { font-style: italic; }
  hr { border: 0; height: 1px; background: var(--rule); margin: 2.5em 0; }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .container { max-width: var(--content-w); margin: 0 auto; padding: 0 1.5rem; }
  .container-wide { max-width: var(--wide-w); margin: 0 auto; padding: 0 1.5rem; }

  /* ============================================================
     HEADER / NAV
     ============================================================ */
  .site-header {
    border-bottom: 2px solid var(--rule);
    background: rgba(17, 17, 17, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .site-header__inner {
    max-width: var(--wide-w);
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: var(--ink);
  }
  .brand__mark {
    width: 38px; height: 38px;
    border: 2px solid var(--gold);
    display: grid; place-items: center;
    font-family: var(--sans);
    font-size: 1.3rem;
    font-weight: 900;
    background: var(--paper);
    color: var(--ink);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    flex-shrink: 0;
  }
  .brand__name {
    font-family: var(--serif);
    font-size: 1.05rem;
    line-height: 1.1;
    letter-spacing: 0.01em;
  }
  .brand__name small {
    display: block;
    font-family: var(--sans);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    margin-top: 2px;
  }
  .nav-links {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  .nav-links a {
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-soft);
    transition: color 120ms;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--ink); }
  .nav-links a.active::after {
    content: '';
    display: block;
    width: 100%; height: 1px;
    background: var(--gold);
    margin-top: 4px;
  }
  @media (max-width: 640px) {
    .nav-links { display: none; }
    .nav-links.show-mobile { display: flex; gap: 0.75rem; }
    .nav-links a { font-size: 0.75rem; }
  }

  /* ============================================================
     HERO
     ============================================================ */
  .hero {
    padding: clamp(3rem, 8vw, 6rem) 1.5rem clamp(2rem, 5vw, 4rem);
    border-bottom: 1px solid var(--rule);
    background:
      linear-gradient(180deg, transparent 0%, rgba(255, 204, 0, 0.03) 100%);
  }
  .hero__inner { max-width: var(--wide-w); margin: 0 auto; }
  .hero__eyebrow {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .hero__eyebrow::before {
    content: '';
    display: block;
    width: 40px; height: 1px;
    background: var(--gold);
  }
  .hero__title {
    max-width: 900px;
    margin-bottom: 1.5rem;
  }
  .hero__title em {
    font-style: italic;
    color: var(--gold);
  }
  .hero__lede {
    font-size: clamp(1.1rem, 1.8vw, 1.3rem);
    max-width: 640px;
    color: var(--ink-soft);
    line-height: 1.5;
    margin-bottom: 2.5rem;
  }
  .hero__cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
  }

  /* Personalized banner (shown when ?c= present) */
  .personal-banner {
    background: var(--ink);
    color: var(--cream);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    border-radius: 2px;
    max-width: 720px;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow);
  }
  .personal-banner__icon {
    width: 32px; height: 32px;
    border: 1px solid var(--gold-soft);
    display: grid; place-items: center;
    color: var(--gold-soft);
    flex-shrink: 0;
    font-family: var(--serif);
    font-style: italic;
  }
  .personal-banner__text { font-size: 0.95rem; line-height: 1.4; }
  .personal-banner__text strong { color: var(--gold-soft); font-weight: 500; }

  /* ============================================================
     BUTTONS
     ============================================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.95rem 1.6rem;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 900;
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 2px solid var(--gold);
    background: var(--gold);
    color: var(--paper-deep);
    cursor: pointer;
    transition: all 180ms cubic-bezier(.2,.7,.3,1);
    border-radius: 0;
    font-family: var(--sans);
  }
  .btn:hover {
    background: transparent;
    color: var(--gold);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(255, 204, 0, 0.25);
  }
  .btn--ghost {
    background: transparent;
    color: var(--gold);
  }
  .btn--ghost:hover {
    background: var(--gold);
    color: var(--paper-deep);
  }
  .btn--gold {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--paper-deep);
  }
  .btn--gold:hover {
    background: var(--gold-deep);
    border-color: var(--gold-deep);
    color: var(--paper-deep);
  }
  .btn--small {
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }
  .btn__arrow { font-family: var(--serif); font-size: 1.1rem; line-height: 1; }

  /* ============================================================
     SECTIONS
     ============================================================ */
  .section {
    padding: clamp(3rem, 6vw, 5rem) 1.5rem;
  }
  .section--alt { background: var(--paper-deep); border-top: 1px solid var(--rule-soft); border-bottom: 1px solid var(--rule-soft); }
  .section__head {
    max-width: var(--wide-w);
    margin: 0 auto 3rem;
    text-align: left;
  }
  .section__eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-deep);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .section__eyebrow::before {
    content: '';
    display: block;
    width: 32px; height: 1px;
    background: var(--gold);
  }

  /* ============================================================
     STEPS (How it works)
     ============================================================ */
  .steps {
    max-width: var(--wide-w);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    border: 1px solid var(--rule);
    background: var(--cream);
  }
  .step {
    padding: 2rem 1.75rem;
    border-right: 1px solid var(--rule);
    position: relative;
  }
  .step:last-child { border-right: none; }
  .step__num {
    font-family: var(--serif);
    font-size: 3rem;
    line-height: 1;
    color: var(--gold);
    font-style: italic;
    font-variation-settings: 'SOFT' 100;
    margin-bottom: 1rem;
  }
  .step__title {
    font-family: var(--serif);
    font-size: 1.3rem;
    margin-bottom: 0.6rem;
    line-height: 1.2;
  }
  .step__body {
    font-size: 0.92rem;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0;
  }
  @media (max-width: 880px) {
    .step { border-right: none; border-bottom: 1px solid var(--rule); }
    .step:last-child { border-bottom: none; }
  }

  /* ============================================================
     DISCLOSURE BLOCK
     ============================================================ */
  .disclosure {
    max-width: var(--content-w);
    margin: 0 auto;
    padding: 2.25rem 2rem;
    border: 1px solid var(--rule);
    border-left: 4px solid var(--gold);
    background: var(--cream);
    box-shadow: var(--shadow);
  }
  .disclosure h3 {
    font-family: var(--sans);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold-deep);
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .disclosure p { font-size: 0.95rem; line-height: 1.65; color: var(--ink-soft); }
  .disclosure p:last-child { margin-bottom: 0; }
  .disclosure strong { color: var(--ink); }

  /* ============================================================
     FORM
     ============================================================ */
  .form {
    max-width: var(--content-w);
    margin: 0 auto;
    background: var(--cream);
    border: 1px solid var(--rule);
    padding: 2.5rem;
    box-shadow: var(--shadow);
  }
  .form__title {
    font-family: var(--serif);
    font-size: 1.8rem;
    margin-bottom: 0.4rem;
    letter-spacing: -0.01em;
  }
  .form__intro { font-size: 0.95rem; color: var(--ink-soft); margin-bottom: 2rem; }
  .field { margin-bottom: 1.25rem; }
  .field--row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .field--row { grid-template-columns: 1fr; } }
  .field label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 0.85rem 0.9rem;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: var(--sans);
    font-size: 1rem;
    color: var(--ink);
    border-radius: 0;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.25);
  }
  .field textarea { min-height: 100px; resize: vertical; }
  .field__hint { font-size: 0.8rem; color: var(--ink-mute); margin-top: 0.3rem; }
  .form__submit { margin-top: 1.5rem; }
  .form__success {
    padding: 1.25rem;
    background: rgba(61, 92, 68, 0.08);
    border-left: 3px solid var(--moss);
    color: var(--moss);
    font-size: 0.95rem;
    margin-top: 1.5rem;
  }

  /* ============================================================
     AGREEMENT VIEW
     ============================================================ */
  .agreement-wrap { max-width: 820px; margin: 0 auto; padding: 0 1.5rem; }
  .agreement-cover {
    padding: 4rem 0 3rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 3rem;
  }
  .agreement-cover__label {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 1.5rem;
  }
  .agreement-cover__title {
    font-size: clamp(2rem, 4.5vw, 3.2rem);
    line-height: 1.05;
    margin-bottom: 2rem;
    letter-spacing: -0.025em;
    font-weight: 350;
  }
  .agreement-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem 2rem;
    padding: 1.5rem;
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 2px;
  }
  .agreement-meta__item dt {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    margin-bottom: 0.3rem;
  }
  .agreement-meta__item dd {
    margin: 0;
    font-size: 0.95rem;
    color: var(--ink);
    font-weight: 500;
  }

  .agreement-section { margin-bottom: 2.5rem; }
  .agreement-section h2 {
    font-size: 1.4rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
  }
  .agreement-section h2 .num {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--gold-deep);
    font-weight: 500;
  }
  .agreement-section h3 {
    font-family: var(--sans);
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 600;
    margin: 1.5rem 0 0.6rem;
  }
  .agreement-section p, .agreement-section li {
    font-size: 0.96rem;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .agreement-section ol, .agreement-section ul {
    padding-left: 1.5em;
    margin: 0 0 1em;
  }
  .agreement-section li { margin-bottom: 0.5em; }

  .agreement-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    background: var(--cream);
    border: 1px solid var(--rule);
    font-size: 0.95rem;
  }
  .agreement-table th, .agreement-table td {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--rule-soft);
    text-align: left;
    vertical-align: top;
  }
  .agreement-table th {
    font-family: var(--sans);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    background: var(--paper-deep);
  }
  .agreement-table tr:last-child td { border-bottom: none; }
  .agreement-table .amount { font-family: var(--mono); font-size: 0.95rem; }

<script>
/* ============================================================

  /* ============================================================

   ============================================================ */
const supabaseUrl = "https://urmwrmeycimtleoeirmn.supabase.co";
const supabaseKey = "sb_publishable_l165SNZrHJ4XqQh46bqS9g_d9L-EsJX";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
const STORE_KEY = 'vorvo_signed_v1';

const SITE_CONFIG = {
  brandName: "Vorvo Services",
  brandSubtitle: "Property & Asset Solutions",
  categories: {
    assets: {

          link: "#/wholesale",
          ctaText: "Enter Wholesale Portal →",
          bullets: [

      ]
    },
    labor: {
      title: "Labor & Contractor Services",
      subtitle: "Nationwide Labor Coordination",
      description: "Need moving help, junk removal, pressure washing, or yard work? Vorvo is the nationwide coordination layer.",
      services: [
        {
          id: "labor",
          title: "Labor Coordination",
          description: "Need moving help, junk removal, pressure washing, or yard work? We collect your request, organize details, check trusted provider availability in your area, and help you get clear quotes.",
          link: "#/vorvo",
          ctaText: "Enter Labor Portal →",
          bullets: [
            "Moving help & furniture pickup",
            "Junk removal & hauling",
            "Pressure washing (driveways, patios, fences)",
            "Yard work, mowing & cleanups"
          ]
        }
      ]

};

const App = {
  state: {
    client: null,
    signature: null,
    typedName: '',
    signedAt: null,
    confirmed: false,
    auditLog: [],
    ipAddress: null,
    ipLocation: null,
    adminUser: null,
    adminDraft: {},
  },

  logAudit(event) {
    const timestamp = new Date().toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });
    this.state.auditLog.push({ time: timestamp, event });
    console.log(`[AUDIT] ${timestamp} — ${event}`);
  },

  async init() {
    this.loadClient();
    
    // Fetch IP address and location via HTTPS
    fetch('https://ipinfo.io/json')
      .then(r => r.json())
      .then(d => {
        this.state.ipAddress = d.ip || 'unavailable';
        const parts = [d.city, d.region, d.country].filter(Boolean);
        this.state.ipLocation = parts.join(', ') || 'unavailable';
      })
      .catch(() => {
        this.state.ipAddress = 'unavailable';
        this.state.ipLocation = 'unavailable';
      });

    // Check Supabase auth session FIRST so admin login renders immediately
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session?.user) this.state.adminUser = session.user;

    // Listen for auth state changes
    supabaseClient.auth.onAuthStateChange((_event, session) => {
      this.state.adminUser = session?.user || null;
      this.render();
    });

    // Only load agreement data on agreement route (not admin)
    const currentRoute = this.getRoute();
    if (currentRoute === 'agreement') {
      await loadAgreement();
      this.loadSignedState();
    } else if (currentRoute === 'wholesale-agreement') {
      await loadWholesaleAgreement();
      this.loadSignedState();
    } else if (currentRoute === 'assignment') {
      await loadAssignmentAgreement();
      this.loadSignedState();
    }

    window.addEventListener('hashchange', async () => {
      const route = this.getRoute();
      if (route === 'agreement') {
        await loadAgreement();
        this.loadSignedState();
      } else if (route === 'wholesale-agreement') {
        await loadWholesaleAgreement();
        this.loadSignedState();
      } else if (route === 'assignment') {
        await loadAssignmentAgreement();
        this.loadSignedState();
      }
      this.render();
    });
    this.render();
  },

  loadClient() {
    const params = new URLSearchParams(window.location.search);
    const c = params.get('c');
    if (c) {
      try {
        const decoded = atob(c.replace(/-/g, '+').replace(/_/g, '/'));
        this.state.client = JSON.parse(decodeURIComponent(escape(decoded)));
      } catch (e) {
        console.warn('Failed to parse client param', e);
      }
    }
  },

  loadSignedState() {
    try {
      // Key by agreementId — never load state for 'guest' (unsigned/blank pages)
      const agreementId = String(this.state.client?.id || '');
      if (!agreementId) {
        localStorage.removeItem(STORE_KEY); // clear any stale guest entry
        return;
      }
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed.agreementId === agreementId) {
          this.state.signature = parsed.signature;
          this.state.typedName = parsed.typedName;
          this.state.signedAt = parsed.signedAt;
        }
      }
    } catch (e) {
      console.warn('Failed to load signed state', e);
    }
  },

  saveSignedState() {
    try {
      const agreementId = String(this.state.client?.id || '');
      if (!agreementId) return; // never save for guest/blank pages
      localStorage.setItem(STORE_KEY, JSON.stringify({
        agreementId,
        signature: this.state.signature,
        typedName: this.state.typedName,
        signedAt: this.state.signedAt,
      }));
    } catch (e) { console.warn('Save failed', e); }
  },

  /**
   * SELF-HEALING: Setup global error listeners
   */
  setupErrorRecovery() {
    window.onerror = (msg, url, line, col, error) => {
      this.handleFatalError(error || msg, 'global');
    };
    window.onunhandledrejection = (event) => {
      this.handleFatalError(event.reason, 'promise');
    };
  },

  /**
   * SELF-HEALING: Diagnostic tools (Ctrl+Shift+D)
   */
  setupDiagnostics() {
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'D') {
        const logs = JSON.parse(localStorage.getItem('vorvo-error-logs') || '[]');
        console.table(logs);
        alert('Diagnostic data logged to console. Errors found: ' + logs.length);
      }
    });
  },

  /**
   * SELF-HEALING: Logic to handle fatal crashes
   */
  handleFatalError(error, source) {
    const errorMsg = error?.message || String(error);
    console.error(`[Vorvo Self-Healing] Fatal error from ${source}:`, errorMsg);
    
    // Log to localStorage for diagnostics
    try {
      const logs = JSON.parse(localStorage.getItem('vorvo-error-logs') || '[]');
      logs.push({
        time: new Date().toISOString(),
        source,
        message: errorMsg,
        stack: error?.stack,
        url: window.location.href
      });
      localStorage.setItem('vorvo-error-logs', JSON.stringify(logs.slice(-20)));
      
      const count = parseInt(localStorage.getItem('vorvo-crash-count') || '0') + 1;
      localStorage.setItem('vorvo-crash-count', count);
    } catch (e) {}

    // Show the recovery UI
    if (typeof displayCrashRecovery === 'function') {
      displayCrashRecovery(errorMsg);
    }
  },

  hasSigned() {
    return !!(this.state.signature && this.state.typedName && this.state.signedAt);
  },

  getRoute() {
    const hash = window.location.hash.replace(/^#\/?/, '').split('?')[0];
    if (!hash) {
      if (this.state.client) {
        return 'surplus';
      }
      return 'portal';
    }
    return hash;
  },

  render() {
    const route = this.getRoute();
    const app = document.getElementById('app');
    let html = renderHeader(route);
    switch (route) {
      case 'privacy': html += renderPrivacy(); break;
      case 'terms': html += renderTerms(); break;
      case 'client-agreement': html += renderClientAgreement(); break;
      case 'agreement': {
        const _hash = window.location.hash;
        const _qs = _hash.includes('?') ? _hash.split('?')[1] : '';
        const _token = new URLSearchParams(_qs).get('token');
        html += _token ? renderAgreement() : renderUnauthorized();
        break;
      }
      case 'guide':     html += renderGuide(); break;
      case 'admin':     html += renderAdmin(); break;
      case 'surplus':   html += renderLanding(); break;
      case 'vorvo':     html += renderVorvoLanding(); break;
      case 'wholesale': html += renderWholesaleLanding(); break;
      case 'wholesale-agreement': {
        const _hash = window.location.hash;
        const _qs = _hash.includes('?') ? _hash.split('?')[1] : '';
        const _token = new URLSearchParams(_qs).get('token');
        html += _token ? renderWholesaleAgreement() : renderUnauthorized();
        break;
      }
      case 'assignment': {
        const _hash = window.location.hash;
        const _qs = _hash.includes('?') ? _hash.split('?')[1] : '';
        const _token = new URLSearchParams(_qs).get('token');
        html += _token ? renderAssignmentAgreement() : renderUnauthorized();
        break;
      }
      case 'track':     html += renderTrack(); break;
      case 'portal':
      default:          html += renderPortal(); break;
    }
    html += renderFooter(route);
    app.innerHTML = html;
    bindHandlers(route);
    window.scrollTo(0, 0);
  },
};

        <h3>Where the money goes — the path</h3>
        <ol>
          <li><strong>Foreclosure sale.</strong> The substitute trustee conducts the sale. After paying senior debts and costs, any leftover money is the surplus.</li>
          <li><strong>Held by the trustee or court.</strong> The trustee may hold the surplus for a period of time, or — depending on circumstances — deposit it into the county court registry.</li>
          <li><strong>Reported to the State.</strong> If the surplus is not claimed by the former owner within the abandonment period (generally one to three years, depending on the property type), the holder is required by Chapter 74 of the Texas Property Code to remit it to the Comptroller.</li>

      <section class="doc__section" id="s5">
        <div class="doc__section-num">Section 05</div>
        <h2>Required Documents Checklist</h2>
        <p>The State of Texas customizes the document list to each claim. The categories below cover what the Comptroller most commonly requires for a former-owner foreclosure-surplus claim. <strong>Always follow the exact list shown to you on the portal.</strong></p>

          <li><strong>Government-issued photo ID.</strong> Texas driver's license, Texas ID card, U.S. passport, or military ID. Must be current (not expired).</li>
          <li><strong>Proof of Social Security Number.</strong> A photocopy of your Social Security card is best. The State may also accept a redacted W-2, redacted SSA benefits statement, or other SSA-issued document showing your full SSN. Black out everything except your name and SSN.</li>
          <li><strong>Proof of current address.</strong> Recent utility bill, bank statement, lease, or property tax statement showing your current mailing address (within the last 60–90 days).</li>
        </ul>

        <h3>Proof of former ownership of the foreclosed property</h3>
        <p>You need to connect your identity today to your ownership of the property at the time of foreclosure. Provide at least one — ideally two — of the following:</p>
        <ul>
          <li>Recorded deed showing you as grantee at the property address (county clerk's office has copies).</li>
          <li>Old mortgage statement from the lender that foreclosed, in your name at the property address.</li>
          <li>Property tax statement from the appraisal district, in your name at the property address (CAD records are public and free).</li>
          <li>Closing / settlement statement (HUD-1 or Closing Disclosure) from when you purchased the property.</li>
          <li>Foreclosure notice or trustee's deed mailed to you at the property address.</li>
          <li>Utility bill (electric, water, gas) in your name at the property address from any month you lived there.</li>
        </ul>

        <h3>Name-change bridging documents (only if your name has changed)</h3>
        <ul>
          <li><strong>Marriage certificate</strong> — connects maiden name to married name.</li>
          <li><strong>Divorce decree</strong> — if your divorce restored a previous name.</li>
          <li><strong>Court order changing name</strong> — for any other legal name change.</li>
        </ul>

        <div class="callout"><strong>Pro Tip</strong>The Comptroller's examiners are humans with a checklist. Make their job easy: clear scans, every page right-side-up, no glare, no cut-off corners. A neat packet gets approved faster than a sloppy one with the same information.</div>
      </section>

      <section class="doc__section" id="s6">
        <div class="doc__section-num">Section 06</div>
        <h2>Special Situation — Claiming as an Heir</h2>
        <p>If the former owner has passed away, the surplus belongs to that person's estate, and you can claim it as an heir, executor, or personal representative. <strong>Heir claims are more involved than owner claims</strong> — plan on extra time and expect the State to scrutinize the supporting documents carefully.</p>
        <h3>What you'll need on top of the regular checklist</h3>
        <table class="doc__table">
          <thead>
            <tr><th>Situation</th><th>Documents You'll Likely Need</th></tr>
          </thead>
          <tbody>
            <tr><td><strong>Probated will exists</strong></td><td>Certified copy of the will, Order Admitting Will to Probate, Letters Testamentary issued to the executor.</td></tr>
            <tr><td><strong>Estate opened but no will</strong></td><td>Letters of Administration issued by the probate court, court order identifying the heirs.</td></tr>
            <tr><td><strong>No estate opened (small estate)</strong></td><td>Affidavit of Heirship meeting Texas requirements (typically signed by two disinterested witnesses with personal knowledge of the family history), recorded at the county clerk's office where the property is located.</td></tr>
            <tr><td><strong>All heirs claiming</strong></td><td>Original owner's death certificate (certified copy), proof of identity for each claiming heir, and (if applicable) a written agreement among heirs on how to split the funds.</td></tr>
          </tbody>
        </table>
        <div class="callout callout--warn"><strong>Consult a Texas Attorney</strong>Affidavits of Heirship, probate filings, and disputes among heirs are areas where small mistakes cause big delays — or permanently forfeit the funds to another claimant. If you are claiming as an heir, especially if the surplus is substantial, the cost of an hour of a Texas probate attorney's time is usually money well spent.</div>
        <h3>If multiple heirs may claim</h3>
        <p>Vorvo will not knowingly enter a service agreement with more than one claimant for the same Property ID. If competing heirs surface during your claim, your service agreement allows Vorvo to withdraw — and you will owe Vorvo nothing for the work already done. Your right to claim from the State, of course, continues regardless.</p>
      </section>

      <section class="doc__section" id="s7">
        <div class="doc__section-num">Section 07</div>
        <h2>Common Pitfalls &amp; What Slows Claims Down</h2>
        <p>Most foreclosure surplus claims are approved. The ones that get denied, or sit in limbo for months, usually fail for predictable reasons. Knowing what they are is half the battle.</p>
        <h3>1. Wrong claimant type selected</h3>
        <p>Choosing "Owner" when you should have chosen "Heir/Representative" (or vice versa) almost always triggers a denial. Re-read Step 3 and pick the option that accurately describes you.</p>
        <h3>2. Name mismatch with no bridging document</h3>
        <p>If the property record lists "Maria Garcia" but your ID says "Maria Lopez," you need a marriage certificate or court order tying the names together. Without it, the examiner cannot confirm you're the same person.</p>
        <h3>3. Address that doesn't connect you to the property</h3>
        <p>Some claimants try to prove ownership using utility bills from a current address — which doesn't help. You need at least one document showing your name at the foreclosed property's address.</p>
        <h3>4. Illegible or partial scans</h3>
        <p>Dark, blurry, or cropped scans get flagged. Use a flatbed scanner if you can, or a phone scanning app (CamScanner, Adobe Scan, Apple Notes) with shadows controlled and the whole document in frame.</p>
        <h3>5. Missing notarization on a high-dollar form</h3>
        <p>If the form says "notarize," the form must be notarized. The State will not accept a workaround.</p>
        <h3>6. Ignoring the State's follow-up email</h3>
        <p>If the examiner emails asking for one more document and you don't respond within 30 days, your claim may be administratively closed. Check the email account on file at least twice a week.</p>
        <h3>7. Falling for impersonator websites or third-party "filers"</h3>
        <p>The State never charges to return your money. Anyone who tells you otherwise — including a website you found through a search ad — is not the State. Always type claimittexas.gov directly into your browser.</p>
        <h3>8. Liens you didn't know about</h3>
        <p>The State may offset child-support arrears, state tax debts, or other statutory liens from your disbursement. This isn't an error and isn't reviewable through the claims process — it's a separate state-law procedure. Your 10% fee to Vorvo, by contrast, is calculated only on the net amount actually disbursed to you, not the gross.</p>
      </section>

      <section class="doc__section" id="s8">
        <div class="doc__section-num">Section 08</div>
        <h2>What to Expect — Timeline</h2>
        <p>Texas processing times vary by claim type, dollar amount, and the State's workload. The chart below is a realistic estimate — not a guarantee. Heir claims and high-dollar claims sit at the longer end of the range; clean owner claims of modest amounts can move quickly.</p>
        <ul class="timeline">
          <li>
            <div class="timeline__when">Day 0</div>
            <div class="timeline__what"><strong>You submit your claim</strong> on claimittexas.gov with all required documents. The portal assigns you a claim / tracking number — write it down.</div>
          </li>
          <li>
            <div class="timeline__when">Days 1–7</div>
            <div class="timeline__what"><strong>Initial intake review.</strong> The Comptroller's office confirms your packet is complete on its face. If anything is missing or unclear, expect an email asking for it.</div>
          </li>
          <li>
            <div class="timeline__when">Weeks 2–6</div>
            <div class="timeline__what"><strong>Examiner review.</strong> A claims examiner verifies your identity, your ownership of the foreclosed property, and that no competing claim is on file. They may request additional documents during this stage — respond promptly.</div>
          </li>
          <li>
            <div class="timeline__when">Weeks 4–12 (typical)</div>
            <div class="timeline__what"><strong>Approval &amp; disbursement.</strong> Once approved, the State issues payment by check (mailed to your address on file) or ACH. Simple owner claims often resolve toward the shorter end; heir or contested claims toward the longer end.</div>
          </li>
          <li>
            <div class="timeline__when">Within 3 business days of receipt</div>
            <div class="timeline__what"><strong>You notify Vorvo</strong> in writing of the disbursement. (Required by your service agreement — see Section 09.)</div>
          </li>
          <li>
            <div class="timeline__when">Within 10 business days of receipt</div>
            <div class="timeline__what"><strong>You pay Vorvo's 10% contingency service fee</strong> on the net amount actually disbursed to you, per the invoice Vorvo sends.</div>
          </li>
        </ul>
        <div class="callout"><strong>If Things Stall</strong>If your claim has been pending for more than 90 days with no contact from an examiner, you can check status by calling the Unclaimed Property Division directly (number listed on claimittexas.gov) or by logging back into the portal. Vorvo cannot check status on your behalf — that requires identifying yourself to the State.</div>
      </section>

      <section class="doc__section" id="s9">
        <div class="doc__section-num">Section 09</div>
        <h2>Your Obligations Under the Service Agreement</h2>
        <p>You signed a Texas Surplus Property Research Service Agreement with Vorvo. This section summarizes your ongoing duties under that agreement. It is a plain-English recap — the agreement itself controls in any conflict.</p>
        <h3>1. File the claim yourself</h3>
        <p>Vorvo is legally prohibited from filing on your behalf under Tex. Prop. Code § 74.507(b). You — or your lawful attorney-in-fact or legal representative — must complete, sign, and submit every claim form.</p>
        <h3>2. Notify Vorvo of disbursement within 3 business days <span style="font-family:var(--mono); font-size:0.7em; color:var(--rust); letter-spacing:0.1em;">— MATERIAL</span></h3>
        <p>When the State pays you, you must notify Vorvo in writing within <strong>three (3) business days</strong>. Email to Vorvo's address on file is sufficient. Include:</p>
        <ul>
          <li>The date of disbursement.</li>
          <li>The gross amount you received.</li>
          <li>The method of payment (check, ACH, or otherwise).</li>
        </ul>
        <p>This obligation is a <strong>material term</strong> of your agreement. Skipping it is a breach, even if you intend to pay the fee later.</p>
        <h3>3. Pay the 10% contingency service fee within 10 business days</h3>
        <p>Vorvo will email you a written invoice. Payment is due within 10 business days of your receipt of disbursement. The fee is 10% of the gross amount actually disbursed to you — not the originally estimated amount, and not any portion the State offset for liens or other statutory deductions.</p>
        <h3>4. Notice-and-cure if payment is missed</h3>
        <p>If you fail to remit timely payment, Vorvo will send you a written demand letter. Under your agreement, the demand letter is valid only if sent both:</p>
        <ol>
          <li>By email to your email address on file, and</li>
          <li>By certified U.S. mail, return receipt requested, to your last known mailing address.</li>
        </ol>
        <p>You then have <strong>fifteen (15) days</strong> from the date the demand letter is sent to cure the default before Vorvo may pursue further remedies. (Note: not picking up the certified mail does not invalidate the notice, so long as both methods of delivery were used.)</p>
        <h3>5. Keep your contact info current</h3>
        <p>If you change your email or mailing address between signing the agreement and being paid, let Vorvo know. The notices above are sent to the address on file at the time they are sent.</p>
        <div class="callout"><strong>Reminder</strong>This section is a summary. The signed Service Agreement is the controlling document. Read it again before disbursement, and consult a Texas attorney if anything is unclear.</div>
      </section>

      <section class="doc__section" id="s10">
        <div class="doc__section-num">Section 10</div>
        <h2>Frequently Asked Questions</h2>
        <div class="faq__item"><h3 class="faq__q">Do I really have to file the claim myself? Can't Vorvo just do it?</h3><p class="faq__a"><strong>No, Vorvo cannot file for you.</strong> Texas Property Code § 74.507(b) prohibits a finder from file or receiving a claim form on a claimant's behalf. Even if Vorvo wanted to, the law forbids it. You must file the claim — or have your lawful attorney-in-fact or legal representative file — yourself.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if the State pays less than the amount listed in my packet?</h3><p class="faq__a">It happens — the State may apply offsets for tax debts, child-support liens, or other statutory deductions, and processing adjustments are common. Vorvo's 10% fee is calculated only on the amount actually disbursed to you, not on the original estimate.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if the State denies my claim entirely?</h3><p class="faq__a">You owe Vorvo nothing. Your service agreement terminates automatically when the Comptroller closes the file without disbursement. You can also refile if the denial was due to a fixable issue (missing document, wrong claimant type), and Vorvo's research remains useful — though a new agreement may be required if substantial new work is needed.</p></div>
        <div class="faq__item"><h3 class="faq__q">How long does this really take?</h3><p class="faq__a">For a clean owner claim with all documents in order: typically <strong>4–8 weeks</strong> from submission to disbursement. For heir claims or claims requiring extra documentation: <strong>2–6 months or longer</strong>. The State does not commit to a deadline; respond fast to their requests and your claim moves faster.</p></div>
        <div class="faq__item"><h3 class="faq__q">Can Vorvo check on my claim status?</h3><p class="faq__a">No. The Comptroller's office discusses claim status only with the claimant or their authorized representative. You can check status by logging into your account at claimittexas.gov or by calling the Unclaimed Property Division directly.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if I want to back out and file on my own?</h3><p class="faq__a">You can terminate the service agreement at any time before you submit a claim using Vorvo's information — no fee, no penalty. Just notify Vorvo in writing (email is fine). After you've submitted using Vorvo's information, the 10% fee is still owed if the claim is paid.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if I find money under my name that wasn't in Vorvo's research?</h3><p class="faq__a">Money the State is holding under your name that Vorvo did not identify and disclose to you is not covered by your service agreement, and no fee is owed on it. You can claim it directly from the State for free, like any owner.</p></div>
        <div class="faq__item"><h3 class="faq__q">Is the 10% fee taxable income to Vorvo, deductible by me?</h3><p class="faq__a">Tax questions are case-specific. Vorvo does not give tax advice. Talk to a CPA or tax professional, especially if the disbursement is large.</p></div>
        <div class="faq__item"><h3 class="faq__q">What if I die before the claim is paid?</h3><p class="faq__a">The claim becomes part of your estate. Your executor or heirs would need to substitute themselves into the claim, providing the documents listed in Section 06. Your service agreement with Vorvo also binds your estate up to the 10% fee on any amount eventually disbursed.</p></div>
        <div class="faq__item"><h3 class="faq__q">Who do I contact at Vorvo with questions?</h3><p class="faq__a">Use the contact information in the footer of this page. Vorvo can answer process and research questions. <strong>Vorvo cannot give legal advice, file your claim, or talk to the State on your behalf.</strong></p></div>
      </section>

      <div class="no-print" style="margin-top:4rem; text-align:center;">
        <button class="btn btn--ghost" onclick="window.print()">Print or Save Guide as PDF</button>
      </div>
    </main>
  `;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function formatMoney(n) {
  if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '$ ______________';
  const num = Number(n);
  return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function stepCard(num, title, time, body) {
  const n = String(num).padStart(2, '0');
  return `
    <div class="step-card">
      <div class="step-card__header">
        <span class="step-card__num">${n}</span>
        <h3 class="step-card__title">${title}</h3>
        <span class="step-card__time">${time}</span>
      </div>
      <div class="step-card__body">${body}</div>
    </div>
  `;
}

function b64encJson(obj) {
  const json = JSON.stringify(obj);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return b64.replace(/\+/g, '-').replace(/\//g, '_');
}

function setupSignaturePad() {
  const pad = document.getElementById('sig-pad');
  const canvas = document.getElementById('sig-canvas');
  const clearBtn = document.getElementById('sig-clear');
  if (!pad || !canvas) return;

  const ctx = canvas.getContext('2d');
  let drawing = false;
  let hasInk = false;

  let lastWidth = 0;
  function resize() {
    const currentWidth = pad.offsetWidth;
    if (currentWidth === lastWidth) return;
    lastWidth = currentWidth;
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = currentWidth * ratio;
    canvas.height = pad.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.strokeStyle = '#15172b';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();
  window.addEventListener('resize', resize);

  function getPos(e) {
    const rect = pad.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return {
      x: point.clientX - rect.left,
      y: point.clientY - rect.top,
    };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if (!hasInk) {
      hasInk = true;
      pad.classList.add('signed');
    }
  }
  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
  }

  pad.addEventListener('mousedown', start);
  pad.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  pad.addEventListener('touchstart', start, { passive: false });
  pad.addEventListener('touchmove', move, { passive: false });
  pad.addEventListener('touchend', end, { passive: false });

  // Audit: log when signature is drawn
  pad.addEventListener('mouseup', () => {
    if (pad.classList.contains('signed')) {
      App.logAudit('Signature drawn on canvas');
    }
  });
  pad.addEventListener('touchend', () => {
    if (pad.classList.contains('signed')) {
      App.logAudit('Signature drawn on canvas (touch)');
    }
  });

  clearBtn?.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasInk = false;
    pad.classList.remove('signed');
    updateSubmitState();
  });

  // Update submit button state on signature change
  const observer = new MutationObserver(updateSubmitState);
  observer.observe(pad, { attributes: true, attributeFilter: ['class'] });
}

function setupSignSubmit() {
  const typedInput = document.getElementById('typed-name');
  const confirmBox = document.getElementById('confirm-box');
  const submit = document.getElementById('sign-submit');
  const emailInput = document.getElementById('sign-email');

  let nameLogTimer = null;
  typedInput?.addEventListener('input', () => {
    updateSubmitState();
    // Debounce — only log after user stops typing for 1 second
    clearTimeout(nameLogTimer);
    if (typedInput.value.trim().length >= 3) {
      nameLogTimer = setTimeout(() => {
        App.logAudit('Printed name confirmed: ' + typedInput.value.trim());
      }, 1000);
    }
  });

  confirmBox?.addEventListener('change', () => {
    updateSubmitState();
    if (confirmBox.checked) {
      App.logAudit('Agreement confirmation checkbox checked');
    }
  });

  emailInput?.addEventListener('input', updateSubmitState);

  submit?.addEventListener('click', async () => {
    const errEl = document.getElementById('sign-error');
    const pad = document.getElementById('sig-pad');
    const canvas = document.getElementById('sig-canvas');
    const typedName = typedInput.value.trim();
    const clientEmail = emailInput.value.trim();

    // Validation — all guards up front
    if (!pad.classList.contains('signed')) {
      errEl.textContent = 'Please draw your signature in the box above.';
      errEl.style.display = 'block';
      return;
    }
    if (typedName.length < 3) {
      errEl.textContent = 'Please type your full legal name to confirm your signature.';
      errEl.style.display = 'block';
      return;
    }
    if (!confirmBox.checked) {
      errEl.textContent = 'Please check the confirmation box to agree to the terms.';
      errEl.style.display = 'block';
      return;
    }
    if (!clientEmail) {
      errEl.textContent = 'Please enter your email address to receive a copy of this agreement.';
      errEl.style.display = 'block';
      return;
    }

    // Prevent double-submit
    submit.disabled = true;
    submit.textContent = 'Submitting…';

    App.state.signature = canvas.toDataURL('image/png');
    App.state.typedName = typedName;
    App.state.signedAt = new Date().toISOString();
    App.saveSignedState();

    // Log audit entries before DB write so they're captured in the record
    App.logAudit('Sign button clicked');
    App.logAudit('Agreement submitted — routing to claims guide');

    // UPDATE SUPABASE
    const agreementId = App.state.client?.id;
    if (agreementId) {
      const { error } = await supabaseClient
        .from('agreements')
        .update({
          signed: true,
          signature_data: App.state.signature,
          signer_name: typedName,
          signed_at: App.state.signedAt,
          claimant_email: clientEmail,
        })
        .eq('id', agreementId);

      if (error) {
        console.error('Supabase update failed for id', agreementId, '—', error.message, error.details);
      } else {
        console.log('Supabase updated for id:', agreementId);
      }
    } else {
      console.error('No agreementId on App.state.client — DB update skipped. client:', JSON.stringify(App.state.client));
    }

    // SEND EMAIL — clean and simple, no PDF generation needed
    const accessToken = App.state.client?.accessToken;
    const agreementPageUrl = `${window.location.origin}${window.location.pathname}#/agreement?token=${accessToken}`;
    try {
      const res = await fetch('/api/send-agreement', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          accessToken,
          typedName,
          signedAt: App.state.signedAt,
          trackingId: App.state.client?.trackingId || '',
          claimantName: App.state.client?.claimantName || typedName,
          propertyId: App.state.client?.propertyId || '',
          estimatedValue: App.state.client?.estimatedValue || null,
          reportedOwner: App.state.client?.reportedOwnerName || '',
          clientEmail,
          ipAddress: App.state.ipAddress || 'unavailable',
          ipLocation: App.state.ipLocation || 'unavailable',
          auditLog: App.state.auditLog,
          agreementId,
          agreementPageUrl,
        }),
      });
      const result = await res.json();
      if (!res.ok) console.error('[Vorvo] Email API error:', result);
      else console.log('[Vorvo] Email sent ✓');
    } catch (err) {
      console.error('[Vorvo] Email send failed:', err.message);
    }

    window.location.hash = '#/guide';
    App.render();
  });
}

function updateSubmitState() {
  const submit = document.getElementById('sign-submit');
  if (!submit) return;
  const pad     = document.getElementById('sig-pad');
  const typed   = document.getElementById('typed-name');
  const confirm = document.getElementById('confirm-box');
  const email   = document.getElementById('sign-email');
  // CRITICAL: never allow signing without a real agreementId loaded from Supabase
  const hasAgreementId = !!(App.state.client?.id);
  const ready   = hasAgreementId
               && pad?.classList.contains('signed')
               && typed?.value.trim().length >= 3
               && confirm?.checked
               && email?.value.trim().length > 0;
  submit.disabled = !ready;
  // Show a warning if no agreement ID (blank page accessed directly)
  const errEl = document.getElementById('sign-error');
  if (errEl && !hasAgreementId) {
    errEl.style.display = 'block';
    errEl.textContent = 'This agreement link is invalid. Please use the personalized link sent to you by Vorvo.';
  }
}

function bindHandlers(route) {
  // Handle cross-page smooth scrolling via ?scroll= element ID query parameter
  const hash = window.location.hash;
  const queryString = hash.includes('?') ? hash.split('?')[1] : '';
  const params = new URLSearchParams(queryString);
  const scrollToId = params.get('scroll');
  if (scrollToId) {
    setTimeout(() => {
      document.getElementById(scrollToId)?.scrollIntoView({ behavior: 'smooth' });
    }, 150);
  }

  if (route === 'agreement' && !App.hasSigned()) {
    if (App.state.auditLog.length === 0) {
      App.logAudit('Agreement page opened');
    }
    initSignatureArea();

    // Log when page is scrolled to bottom (agreement read) — only once
    let scrollLogged = false;
    const onScroll = () => {
      const scrolled = window.scrollY + window.innerHeight;
      const total = document.documentElement.scrollHeight;
      if (scrolled >= total - 100 && !scrollLogged) {
        scrollLogged = true;
        App.logAudit('Agreement scrolled to bottom — full document viewed');
        window.removeEventListener('scroll', onScroll);
      }
    };
    window.addEventListener('scroll', onScroll);
  }

  if (route === 'wholesale-agreement' && !App.hasSigned()) {
    initWholesaleSignatureArea();
  }

  if (route === 'assignment' && !App.hasSigned()) {
    initAssignmentSignatureArea();
  }

  if (route === 'landing' || route === 'surplus') {
    const form = document.getElementById('search-form-el');
    form?.addEventListener('submit', (e) => {
      const data = new FormData(form);
      const successEl = document.getElementById('form-success');
      successEl.innerHTML = `<strong>Request received.</strong> Thank you, ${esc(data.get('fullName'))}. If we identify a matching property, we'll email ${esc(data.get('email'))} within 3–5 business days with a personalized service packet. There is no charge for the search.`;
      successEl.style.display = 'block';
      // NOTE: To wire this up for real, POST to your backend, Formspree, or a webhook here.
      form.reset();
      successEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  if (route === 'vorvo') {
    const form = document.getElementById('vorvo-quote-form');
    const dropzone = document.getElementById('v-dropzone');
    const fileInput = document.getElementById('v-photos');
    const previewContainer = document.getElementById('v-preview-container');
    const dropzoneText = document.getElementById('v-dropzone-text');
    
    let selectedFiles = [];
    
    const handleFiles = (files) => {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        selectedFiles.push(file);
        
        const reader = new FileReader();
        reader.onload = (e) => {
          const div = document.createElement('div');
          div.style.position = 'relative';
          div.style.width = '80px';
          div.style.height = '80px';
          div.style.border = '1px solid var(--rule)';
          div.style.borderRadius = '3px';
          div.style.overflow = 'hidden';
          
          div.innerHTML = `
            <img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;" />
            <button type="button" class="btn-remove-photo" style="position:absolute; top:2px; right:2px; background:rgba(21,23,43,0.8); color:white; border:none; border-radius:50%; width:16px; height:16px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">×</button>
          `;
          
          div.querySelector('.btn-remove-photo').addEventListener('click', (ev) => {
            ev.stopPropagation();
            selectedFiles = selectedFiles.filter(f => f !== file);
            div.remove();
            if (selectedFiles.length === 0) {
              dropzoneText.textContent = 'Drag & drop photos here or click to browse';
            }
          });
          
          previewContainer.appendChild(div);
        };
        reader.readAsDataURL(file);
      }
      dropzoneText.textContent = `${selectedFiles.length} photo(s) selected`;
    };
    
    dropzone?.addEventListener('click', () => fileInput.click());
    
    dropzone?.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.style.borderColor = 'var(--gold)';
    });
    
    dropzone?.addEventListener('dragleave', () => {
      dropzone.style.borderColor = 'var(--rule)';
    });
    
    dropzone?.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.style.borderColor = 'var(--rule)';
      if (e.dataTransfer.files) {
        handleFiles(e.dataTransfer.files);
      }
    });
    
    fileInput?.addEventListener('change', (e) => {
      if (e.target.files) {
        handleFiles(e.target.files);
      }
    });

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const successEl = document.getElementById('vorvo-success');
      const submitBtn = form.querySelector('button[type="submit"]');
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Uploading photos & submitting... <span class="btn__arrow">→</span>';
      
      const imageUrls = [];
      
      // Upload files to Supabase Storage
      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 15)}.${fileExt}`;
        const filePath = `quote-photos/${fileName}`;
        
        try {
          const { data: uploadData, error: uploadError } = await supabaseClient
            .storage
            .from('job-images')
            .upload(filePath, file);
            
          if (uploadError) throw uploadError;
          
          // Get public URL
          const { data: { publicUrl } } = supabaseClient
            .storage
            .from('job-images')
            .getPublicUrl(filePath);
            
          imageUrls.push(publicUrl);
        } catch (err) {
          console.error('Error uploading file:', file.name, err);
        }
      }
      
      const payload = {
        full_name: data.get('fullName'),
        email: data.get('email'),
        phone: data.get('phone'),
        service_category: data.get('serviceCategory'),
        location_address: data.get('location'),
        job_details: data.get('jobDetails'),
        image_urls: imageUrls
      };
      
      let trackingId = 'Pending';
      try {
        const { data: insertedData, error } = await supabaseClient
          .from('property_quotes')
          .insert([payload])
          .select();
          
        if (!error && insertedData && insertedData.length > 0) {
          trackingId = insertedData[0].tracking_id;
          data.append('trackingId', trackingId);
        } else if (error) {
          console.error('Supabase quote insert error:', error);
        }
      } catch (err) {
        console.error('Supabase connection error:', err);
      }
      
      if (imageUrls.length > 0) {
        data.append('imageUrls', imageUrls.join(', '));
      }
      
      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }

      successEl.style.display = 'block';
      form.reset();

      previewContainer.innerHTML = '';

      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Submit Quote Request <span class="btn__arrow">→</span>';
      successEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

    const serviceItemCards = document.querySelectorAll('.service-item-card');
    const totalDisplay = document.getElementById('pricing-running-total');

    const updatePricingTotal = () => {
      let total = 0;
      let allSelected = true;

        if (cb.checked) {
          total += parseInt(cb.dataset.price, 10);
          cb.closest('.service-item-card').style.borderColor = 'var(--gold)';
          cb.closest('.service-item-card').style.background = 'rgba(255, 204, 0, 0.02)';

          cb.closest('.service-item-card').style.borderColor = 'var(--rule-soft)';
          cb.closest('.service-item-card').style.background = 'var(--paper)';
        }
      });

      totalDisplay.textContent = `Base Total: $${total}`;

      if (allSelected) {
        if (chkFullService) chkFullService.checked = true;
        if (fullServiceCard) {
          fullServiceCard.style.background = 'rgba(255, 204, 0, 0.1)';
          fullServiceCard.style.borderColor = 'var(--gold)';
        }
      } else {
        if (chkFullService) chkFullService.checked = false;

          fullServiceCard.style.background = 'rgba(255, 204, 0, 0.05)';
          fullServiceCard.style.borderColor = 'rgba(255, 204, 0, 0.3)';
        }
      }
    };

        return { x: clientX - rect.left, y: clientY - rect.top };

                  return { x: clientX - rect.left, y: clientY - rect.top };

        container.querySelectorAll('.btn-void-contract').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            if (!confirm('Are you sure you want to VOID this contract? This will permanently disable the signature link.')) return;
            
            e.currentTarget.disabled = true;
            e.currentTarget.textContent = 'Voiding...';
            
            try {
              const { data: { session } } = await supabaseClient.auth.getSession();
              const voidRes = await fetch(`/api/contracts/void`, {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${session?.access_token || ''}`
                },
                body: JSON.stringify({ contractId: id })
              });
              
              if (!voidRes.ok) throw new Error('Failed to void contract');
              alert('Contract voided successfully!');
              
              // Save expanded state
              const row = e.currentTarget.closest('.edit-wholesale-row');
              if (row) {
                const dealId = row.id.replace('edit-wholesale-row-', '');
                App.state.expandedWholesaleId = dealId;
              }
              
              await loadWholesaleLeads();
            } catch (err) {
              alert('Error voiding contract: ' + err.message);
              e.currentTarget.disabled = false;
              e.currentTarget.textContent = 'Void';
            }
          });
        });

        // Setup inline contract form toggles and submission
        container.querySelectorAll('.inline-generate-contract-form').forEach(form => {
          const typeSelect = form.querySelector('.igc-type');
          const buyerFields = form.querySelector('.igc-buyer-fields');
          const feeField = form.querySelector('.field-igc-assignment-fee');
          const contractDateField = form.querySelector('.field-igc-contract-date');
          
          const toggle = () => {
            const type = typeSelect.value;
            if (type === 'assignment') {
              buyerFields.style.display = 'grid';
              feeField.style.display = 'block';
              contractDateField.style.display = 'block';
              form.querySelector('.igc-buyer-name').required = true;
              form.querySelector('.igc-buyer-email').required = true;
              form.querySelector('.igc-buyer-phone').required = true;
              form.querySelector('.igc-buyer-address').required = true;
            } else {
              buyerFields.style.display = 'none';
              feeField.style.display = 'none';
              contractDateField.style.display = 'none';
              form.querySelector('.igc-buyer-name').required = false;
              form.querySelector('.igc-buyer-email').required = false;
              form.querySelector('.igc-buyer-phone').required = false;
              form.querySelector('.igc-buyer-address').required = false;
            }
          };
          
          typeSelect.addEventListener('change', toggle);
          toggle();
          
          form.onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Generating...';
            
            const dealId = form.getAttribute('data-deal-id');
            const contractType = typeSelect.value;
            const state = form.querySelector('.igc-state').value;
            const purchasePrice = parseFloat(form.querySelector('.igc-purchase-price').value);
            const earnestMoney = parseFloat(form.querySelector('.igc-earnest-money').value);
            const assignmentFee = parseFloat(form.querySelector('.igc-assignment-fee').value) || null;
            const closingDate = form.querySelector('.igc-closing-date').value;
            const originalContractDate = form.querySelector('.igc-contract-date').value || null;
            const inspectionPeriod = parseInt(form.querySelector('.igc-inspection-period').value) || 15;
            const contractTerms = form.querySelector('.igc-terms').value.trim();
            
            const dealData = {
              purchase_price: purchasePrice,
              earnest_money: earnestMoney,
              assignment_fee: assignmentFee,
              closing_date: closingDate,
              original_contract_date: originalContractDate,
              inspection_period: inspectionPeriod,
              contract_terms: contractTerms
            };
            
            let buyerInfo = null;
            if (contractType === 'assignment') {
              buyerInfo = {
                legal_name: form.querySelector('.igc-buyer-name').value.trim(),
                entity_name: form.querySelector('.igc-buyer-entity').value.trim() || null,
                email: form.querySelector('.igc-buyer-email').value.trim(),
                phone: form.querySelector('.igc-buyer-phone').value.trim(),
                mailing_address: form.querySelector('.igc-buyer-address').value.trim(),
                proof_of_funds_url: form.querySelector('.igc-buyer-pof').value.trim() || null
              };
            }
            
            try {
              const { data: { session } } = await supabaseClient.auth.getSession();
              const createRes = await fetch('/api/contracts', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${session?.access_token || ''}`
                },
                body: JSON.stringify({
                  dealId,
                  contractType,
                  state,
                  dealData,
                  buyerInfo
                })
              });
              
              const result = await createRes.json();
              if (!createRes.ok) throw new Error(result.error || 'Failed to generate contract');
              
              alert('Contract generated and link created successfully!');
              App.state.expandedWholesaleId = dealId;
              await loadWholesaleLeads();
            } catch (err) {
              console.error('Error generating contract:', err);
              alert('Failed to generate contract: ' + err.message);
            } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = 'Generate Contract';
            }
          };
        });
        
        container.querySelectorAll('.btn-save-wholesale').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const formDiv = container.querySelector(`.edit-wholesale-form[data-id="${id}"]`);
            if (!formDiv) return;
            
            const submitBtn = e.currentTarget;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            const status = formDiv.querySelector('.ew-status').value;
            const governingState = formDiv.querySelector('.ew-state').value;
            const askingPrice = parseFloat(formDiv.querySelector('.ew-asking').value) || null;
            const estimatedValue = parseFloat(formDiv.querySelector('.ew-value').value) || null;
            const offerAmount = parseFloat(formDiv.querySelector('.ew-offer').value) || null;
            const depositAmount = parseFloat(formDiv.querySelector('.ew-deposit').value) || null;
            const contractTerms = formDiv.querySelector('.ew-terms').value.trim() || null;
            const internalNotes = formDiv.querySelector('.ew-notes').value.trim() || null;
            
            try {
              const { error } = await supabaseClient
                .from('wholesale_leads')
                .update({
                  status,
                  governing_state: governingState,
                  asking_price: askingPrice,
                  estimated_value: estimatedValue,
                  offer_amount: offerAmount,
                  deposit_amount: depositAmount,
                  contract_terms: contractTerms,
                  internal_notes: internalNotes
                })
                .eq('id', id);
                
              if (error) throw error;
              App.state.expandedWholesaleId = id;
              await loadWholesaleLeads();
              alert('Changes saved successfully!');
            } catch (err) {
              console.error('Error updating wholesale lead:', err);
              alert('Failed to save changes: ' + err.message);
              submitBtn.disabled = false;
              submitBtn.textContent = 'Save Changes';
            }
          });
        });
        
      } catch (err) {
        console.error('Error loading wholesale leads:', err);
        container.innerHTML = `<div style="color:var(--rust); padding:1rem; text-align:center;"><strong>Failed to load requests</strong><br>${esc(err.message)}</div>`;
      }
    }

                  </div>
                </form>
              </td>
            </tr>
          `;

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Copied ✓';
    setTimeout(() => { btn.textContent = original; }, 1800);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied ✓';
  });
}

document.addEventListener('DOMContentLoaded', () => App.init());

function generateAccessToken() {
  const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
  let token = '';
  for (let i = 0; i < 24; i++) {
    token += chars[Math.floor(Math.random() * chars.length)];
  }
  return token;
}


async function loadWholesaleAgreement() {
  const hash = window.location.hash;
  const queryString = hash.includes('?') ? hash.split('?')[1] : '';
  const params = new URLSearchParams(queryString);
  const token = params.get('token');

  if (!token) return;

  try {
    // Try loading from contracts API first
    const res = await fetch(`/api/contracts?token=${encodeURIComponent(token)}`);
    if (res.ok) {
      const result = await res.json();
      if (result.success && result.contract) {
        const contract = result.contract;
        const lead = result.lead;
        
        App.state.contract = contract;
        App.state.client = {
          id: lead.id,
          contractId: contract.id,
          contractType: contract.contract_type,
          accessToken: contract.secure_token,
          claimantName: lead.full_name,
          trackingId: lead.tracking_id,
          propertyAddress: lead.property_address,
          propertyDetails: lead.property_details,
          askingPrice: lead.asking_price,
          estimatedValue: lead.estimated_value,
          offerAmount: lead.asking_price,  // Purchase Price = asking_price
          depositAmount: lead.deposit_amount || 0,  // Earnest Money = deposit_amount from wholesale_leads
          contractTerms: contract.deal_data.contract_terms || lead.contract_terms || '',
          governingState: contract.state,
          dateIssued: new Date(contract.created_at).toLocaleDateString()
        };

        if (contract.status === 'signed' && contract.signature_data) {
          App.state.signature = contract.signature_data;
          App.state.typedName = contract.signer_name || '';
          App.state.signedAt = contract.signed_at || new Date().toISOString();
        } else {
          App.state.signature = null;
          App.state.typedName = '';
          App.state.signedAt = null;
        }
        
        App.render();
        return;
      }
    }
  } catch (err) {
    console.warn('[Vorvo] Contracts API fetch failed, falling back to direct Supabase:', err);
  }

  // Fallback to direct wholesale_leads query
  const { data, error } = await supabaseClient
    .from('wholesale_leads')
    .select('*')
    .eq('access_token', token)
    .single();

  if (error) {
    console.error("[Vorvo] Supabase load error:", error.code, error.message, error.details, error.hint);
    return;
  }

  if (!data) {
    console.error('[Vorvo] No data returned for wholesale lead token:', token);
    return;
  }

  console.log('[Vorvo] Wholesale agreement loaded successfully:', data.tracking_id);

  App.state.contract = null;
  App.state.client = {
    id: data.id,
    accessToken: data.access_token,
    claimantName: data.full_name,
    trackingId: data.tracking_id,
    propertyAddress: data.property_address,
    propertyDetails: data.property_details,
    askingPrice: data.asking_price,
    estimatedValue: data.estimated_value,
    offerAmount: data.offer_amount,
    depositAmount: data.deposit_amount || 0,
    contractTerms: data.contract_terms || '',
    governingState: data.governing_state || 'TX',
    dateIssued: data.created_at ? new Date(data.created_at).toLocaleDateString() : ''
  };

  if (data.signed && data.signature_data) {
    App.state.signature = data.signature_data;
    App.state.typedName = data.signer_name || '';
    App.state.signedAt = data.signed_at || new Date().toISOString();
  } else {
    App.state.signature = null;
    App.state.typedName = '';
    App.state.signedAt = null;
  }

  App.render();
}
