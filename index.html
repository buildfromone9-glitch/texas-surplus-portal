                      </div>
                      <div class="field" style="margin:0;">
                        <label style="font-size:0.7rem;">Option 3 Notes</label>
                        <input type="text" class="eq-notes-3" value="${q.provider_notes_3 || ''}" placeholder="e.g., Premium 3-man team with full equipment" style="width:100%; padding:0.4rem; border:1px solid var(--rule); background:var(--paper); font-size:0.85rem;" />
                      </div>
                    </div>

                    <!-- Actions -->
                    <div style="display:flex; gap:0.5rem; justify-content:flex-end; flex-wrap:wrap; margin-top:0.5rem; align-items:center;">
                      <a href="#/track?id=${esc(q.tracking_id)}&force_preview=true" target="_blank" class="btn btn--small btn--ghost" style="border:1px solid var(--gold); color:var(--gold); text-decoration:none; margin-right:auto; font-size:0.75rem; padding:0.4rem 0.8rem;">Force Contract Preview</a>
                      <button type="button" class="btn btn--small btn--ghost btn-copy-contract-link" data-link="${contractLink}" style="padding:0.4rem 0.8rem; font-size:0.75rem; white-space:nowrap; border:1px solid var(--gold); color:var(--gold);">Copy Contract Link</button>
                      <button type="button" class="btn btn--small btn--ghost btn-cancel-edit" data-id="${q.id}" style="background:none; border:1px solid var(--rule); color:var(--ink-mute);">Cancel</button>
                      <button type="submit" class="btn btn--small btn--gold">Save Changes</button>
                    </div>
                  </div>
                </form>
              </td>
            </tr>
          `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
        
        // Re-expand previously open row if any
        if (App.state.expandedPropertyQuoteId) {
          const editRow = document.getElementById(`edit-row-${App.state.expandedPropertyQuoteId}`);
          if (editRow) editRow.style.display = 'table-row';
        }
        
        // Bind inline edit handlers
        container.querySelectorAll('.btn-edit-quote').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const editRow = document.getElementById(`edit-row-${id}`);
            if (editRow) {
              // Hide all other open edit rows first
              container.querySelectorAll('.edit-quote-row').forEach(row => {
                if (row.id !== `edit-row-${id}`) row.style.display = 'none';
              });
              const isShowing = editRow.style.display === 'table-row';
              editRow.style.display = isShowing ? 'none' : 'table-row';
              App.state.expandedPropertyQuoteId = isShowing ? null : id;
            }
          });
        });
        
        container.querySelectorAll('.btn-cancel-edit').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            const editRow = document.getElementById(`edit-row-${id}`);
            if (editRow) editRow.style.display = 'none';
            App.state.expandedPropertyQuoteId = null;
          });
        });

        // Bind copy link handlers for property quotes
        container.querySelectorAll('.btn-copy-contract-link').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const link = e.currentTarget.getAttribute('data-link');
            navigator.clipboard.writeText(link);
            const origText = e.currentTarget.textContent;
            e.currentTarget.textContent = 'Copied!';
            e.currentTarget.style.color = 'var(--moss)';
            setTimeout(() => {
              e.currentTarget.textContent = origText;
              e.currentTarget.style.color = '';
            }, 1500);
          });
        });
        
        container.querySelectorAll('.edit-quote-form').forEach(form => {
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = e.currentTarget.getAttribute('data-id');
            const submitBtn = e.currentTarget.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            const status = e.currentTarget.querySelector('.eq-status').value;
            
            const quoteAmount = parseFloat(e.currentTarget.querySelector('.eq-amount').value) || null;
            const assignedProviderName = e.currentTarget.querySelector('.eq-provider-name').value.trim() || null;
            const assignedProviderPhone = e.currentTarget.querySelector('.eq-provider-phone').value.trim() || null;
            const providerSchedule1 = e.currentTarget.querySelector('.eq-schedule-1').value.trim() || null;
            const providerNotes1 = e.currentTarget.querySelector('.eq-notes-1').value.trim() || null;

            const quoteAmount2 = parseFloat(e.currentTarget.querySelector('.eq-amount-2').value) || null;
            const providerName2 = e.currentTarget.querySelector('.eq-provider-name-2').value.trim() || null;
            const providerPhone2 = e.currentTarget.querySelector('.eq-provider-phone-2').value.trim() || null;
            const providerSchedule2 = e.currentTarget.querySelector('.eq-schedule-2').value.trim() || null;
            const providerNotes2 = e.currentTarget.querySelector('.eq-notes-2').value.trim() || null;

            const quoteAmount3 = parseFloat(e.currentTarget.querySelector('.eq-amount-3').value) || null;
            const providerName3 = e.currentTarget.querySelector('.eq-provider-name-3').value.trim() || null;
            const providerPhone3 = e.currentTarget.querySelector('.eq-provider-phone-3').value.trim() || null;
            const providerSchedule3 = e.currentTarget.querySelector('.eq-schedule-3').value.trim() || null;
            const providerNotes3 = e.currentTarget.querySelector('.eq-notes-3').value.trim() || null;

            const internalNotes = e.currentTarget.querySelector('.eq-notes').value.trim() || null;
            
            try {
              const { error } = await supabaseClient
                .from('property_quotes')
                .update({
                  status,
                  quote_amount: quoteAmount,
                  assigned_provider_name: assignedProviderName,
                  assigned_provider_phone: assignedProviderPhone,
                  provider_schedule_1: providerSchedule1,
                  provider_notes_1: providerNotes1,
                  
                  quote_amount_2: quoteAmount2,
                  provider_name_2: providerName2,
                  provider_phone_2: providerPhone2,
                  provider_schedule_2: providerSchedule2,
                  provider_notes_2: providerNotes2,
                  
                  quote_amount_3: quoteAmount3,
                  provider_name_3: providerName3,
                  provider_phone_3: providerPhone3,
                  provider_schedule_3: providerSchedule3,
                  provider_notes_3: providerNotes3,
                  
                  internal_notes: internalNotes
                })
                .eq('id', id);
                
              if (error) throw error;
              App.state.expandedPropertyQuoteId = id;
              await loadPropertyQuotes();
              alert('Changes saved successfully!');
            } catch (err) {
              console.error('Error updating quote:', err);
              alert('Failed to save changes: ' + err.message);
              submitBtn.disabled = false;
              submitBtn.textContent = 'Save Changes';
            }
          });
        });
        
        // Checkbox handling and bulk delete for property quotes
        const selectAllProperty = document.getElementById('select-all-property');
        const propertyCheckboxes = container.querySelectorAll('.property-select');
        const deletePropertyBtn = document.getElementById('btn-delete-property');
        
        const updateDeletePropertyVisibility = () => {
          const checkedCount = container.querySelectorAll('.property-select:checked').length;
          if (deletePropertyBtn) {
            deletePropertyBtn.style.display = checkedCount > 0 ? 'inline-block' : 'none';
            deletePropertyBtn.textContent = `Delete Selected (${checkedCount})`;
          }
        };

        selectAllProperty?.addEventListener('change', (e) => {
          propertyCheckboxes.forEach(cb => {
            cb.checked = e.target.checked;
          });
          updateDeletePropertyVisibility();
        });

        propertyCheckboxes.forEach(cb => {
          cb.addEventListener('change', () => {
            if (selectAllProperty) {
              selectAllProperty.checked = Array.from(propertyCheckboxes).every(c => c.checked);
            }
            updateDeletePropertyVisibility();
          });
        });

        if (deletePropertyBtn && !deletePropertyBtn.dataset.bound) {
          deletePropertyBtn.dataset.bound = 'true';
          deletePropertyBtn.addEventListener('click', async () => {
            const checkedBoxes = container.querySelectorAll('.property-select:checked');
            const idsToDelete = Array.from(checkedBoxes).map(cb => cb.getAttribute('data-id'));
            if (idsToDelete.length === 0) return;
            
            if (confirm(`Are you sure you want to permanently delete the ${idsToDelete.length} selected request(s)? This action cannot be undone.`)) {
              deletePropertyBtn.disabled = true;
              deletePropertyBtn.textContent = 'Deleting...';
              try {
                const { error } = await supabaseClient
                  .from('property_quotes')
                  .delete()
                  .in('id', idsToDelete);
                  
                if (error) throw error;
                alert('Selected requests deleted successfully!');
                await loadPropertyQuotes();
              } catch (err) {
                console.error('Error deleting requests:', err);
                alert('Failed to delete requests: ' + err.message);
              } finally {
                deletePropertyBtn.disabled = false;
                updateDeletePropertyVisibility();
              }
            }
          });
        }
        
      } catch (err) {
        console.error('Error loading property quotes:', err);
        container.innerHTML = `<div style="color:var(--rust); padding:1rem; text-align:center;"><strong>Failed to load requests</strong><br>${esc(err.message)}</div>`;
      }
    }

    const form = document.getElementById('admin-form');

    // Restore any saved draft values
    const draft = App.state.adminDraft;
    if (draft) {
      ['a-name','a-email','a-pid','a-owner','a-value','a-research-date'].forEach(id => {
        const el = document.getElementById(id);
        if (el && draft[id]) el.value = draft[id];
      });
    }

    // Save form values to state on every input so they survive tab switches
    ['a-name','a-email','a-pid','a-owner','a-value','a-research-date'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', (e) => {
        App.state.adminDraft[id] = e.target.value;
      });
    });
    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const randomNum = Math.floor(100000 + Math.random() * 900000);
      const payload = {
        tracking_id: 'VRV-SUR-' + randomNum,
        claimant_name: document.getElementById('a-name').value.trim(),
        claimant_email: document.getElementById('a-email').value.trim(),
        property_id: document.getElementById('a-pid').value.trim(),
        reported_owner: document.getElementById('a-owner').value.trim(),
        estimated_value: parseFloat(document.getElementById('a-value').value) || null,
        fee_percent: 10,
        research_date: document.getElementById('a-research-date').value.trim(),
        signed: false,
        access_token: generateAccessToken(),
      };
      const { data, error } = await supabaseClient
        .from('agreements')
        .insert([payload])
        .select();

      if (error) {
        console.error(error);
        alert('Failed to create agreement: ' + error.message);
        return;
      }

      const agreementId = data[0].id;
      const autoTrackingId = data[0].tracking_id;
      const accessToken = data[0].access_token;
      const fullUrl =
        window.location.origin +
        window.location.pathname +
        `#/agreement?token=${accessToken}`;
      const result = document.getElementById('admin-result');
      result.style.display = 'block';
      result.innerHTML = `
        <div class="admin__output" style="margin-bottom:1rem;">
          <div class="admin__output-label" style="font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:0.4rem;">Auto-Generated Tracking ID</div>
          <div style="font-family:var(--mono);font-size:1.1rem;font-weight:bold;color:var(--paper);">${esc(autoTrackingId)}</div>
        </div>
        <div class="admin__output">
          <div class="admin__output-label">Personalized Client URL</div>
          <div id="generated-url" style="user-select:all;">${esc(fullUrl)}</div>
        </div>
        <div class="admin__actions">
          <button class="btn btn--small" onclick="copyToClipboard('${fullUrl.replace(/'/g, "\\'")}', this)">Copy URL</button>
          <button class="btn btn--small btn--gold" id="send-invite-btn">Email to Client</button>
          <span id="send-invite-status" style="font-size:0.85rem; margin-left:0.75rem; display:none;"></span>
          <a class="btn btn--small btn--ghost" href="${fullUrl}" target="_blank">Preview as Client</a>
          <button class="btn btn--small" id="reset-form-btn" style="background:none; border:1px solid var(--rule); color:var(--ink-mute);">Reset Form</button>
        </div>
        <p style="margin-top:1.5rem; font-size:0.85rem; color:var(--ink-mute); line-height:1.5;">Send this URL to the client by email or text. When they open it, they'll see a personalized welcome on the landing page and a fully filled-in agreement ready for signature. After signing, they automatically gain access to the full educational claims guide.</p>
      `;
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Store invite data in closure (avoids HTML encoding issues with data attributes)
      const inviteData = {
        claimantEmail: payload.claimant_email,
        claimantName: payload.claimant_name,
        trackingId: autoTrackingId,
        agreementUrl: fullUrl,
      };

      // Wire up Reset Form button
      document.getElementById('reset-form-btn')?.addEventListener('click', () => {
        form.reset();
        App.state.adminDraft = {};
        result.style.display = 'none';
        result.innerHTML = '';
        form.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // Wire up Email to Client button AFTER it's rendered in the DOM
      document.getElementById('send-invite-btn')?.addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        const statusEl = document.getElementById('send-invite-status');
        btn.disabled = true;
        btn.textContent = 'Sending…';
        statusEl.style.display = 'inline';
        statusEl.style.color = 'var(--ink-mute)';
        statusEl.textContent = '';
        try {
          const { data: { session } } = await supabaseClient.auth.getSession();
          const res = await fetch('/api/send-invite', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session?.access_token || ''}`
            },
            body: JSON.stringify(inviteData),
          });
          const result = await res.json();
          if (res.ok) {
            btn.textContent = 'Sent ✓';
            statusEl.style.color = 'var(--moss)';
            statusEl.textContent = `Delivered to ${inviteData.claimantEmail}`;
          } else {
            console.error('Resend error:', result);
            throw new Error(result?.error?.message || JSON.stringify(result));
          }
        } catch (err) {
          console.error('Send invite failed:', err);
          btn.disabled = false;
          btn.textContent = 'Email to Client';
          statusEl.style.color = 'var(--rust)';
          statusEl.textContent = `Failed: ${err.message}`;
        }
      });
    });

    // ── Invoice form setup ──
    const invDate = document.getElementById('inv-date');
    const invNum  = document.getElementById('inv-number');
    const todayFmt = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    if (invDate && !invDate.value) invDate.value = todayFmt;
    if (invNum  && !invNum.value)  invNum.value  = 'INV-' + new Date().getFullYear() + '-' + String(Math.floor(1000 + Math.random() * 9000));

    function addBizDays(dateStr, n) {
      const d = new Date(dateStr);
      if (isNaN(d)) return '';
      let count = 0;
      while (count < n) { d.setDate(d.getDate() + 1); if (d.getDay() !== 0 && d.getDay() !== 6) count++; }
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    document.getElementById('inv-gross')?.addEventListener('input', function () {
      const fee = document.getElementById('inv-fee');
      if (fee) fee.value = this.value ? (parseFloat(this.value) * 0.10).toFixed(2) : '';
    });

    document.getElementById('inv-disbursement-date')?.addEventListener('blur', function () {
      const due = document.getElementById('inv-due-date');
      if (due && this.value && !due.value) due.value = addBizDays(this.value, 10);
    });

    document.getElementById('inv-lookup-btn')?.addEventListener('click', async () => {
      const id = document.getElementById('inv-agreement-id')?.value.trim();
      if (!id) return alert('Enter an Agreement ID first.');
      const { data, error } = await supabaseClient.from('agreements').select('*').eq('id', id).single();
      if (error || !data) return alert('Agreement not found: ' + (error?.message || 'no record'));
      document.getElementById('inv-name').value     = data.claimant_name  || '';
      document.getElementById('inv-email').value    = data.claimant_email || '';
      document.getElementById('inv-tracking').value = data.tracking_id    || '';
      document.getElementById('inv-property').value = data.property_id    || '';
    });

    document.getElementById('invoice-form')?.addEventListener('submit', async (e) => {

let heroCarouselInterval = null;

function initHeroCarousel() {
  const hero = document.getElementById('hero-carousel');
  if (!hero) return;
  
  const slides = hero.querySelectorAll('.hero__slide');
  const indicators = hero.querySelectorAll('.hero__indicator');
  if (slides.length <= 1) return;
  
  let currentSlide = 0;
  
  const goToSlide = (index) => {
    slides[currentSlide].classList.remove('active');
    indicators[currentSlide]?.classList.remove('active');
    currentSlide = index;
    slides[currentSlide].classList.add('active');
    indicators[currentSlide]?.classList.add('active');
  };
  
  const nextSlide = () => {
    goToSlide((currentSlide + 1) % slides.length);
  };
  
  if (heroCarouselInterval) clearInterval(heroCarouselInterval);
  heroCarouselInterval = setInterval(nextSlide, 6000);
  
  indicators.forEach((btn, idx) => {
    btn.addEventListener('click', () => {
      goToSlide(idx);
      clearInterval(heroCarouselInterval);
      heroCarouselInterval = setInterval(nextSlide, 6000);
    });
  });
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Copied ✓';
    setTimeout(() => { btn.textContent = original; }, 1800);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied ✓';
  });
}

function generateAccessToken() {
  // Generate VRV-CTR-###### format (random 6-digit number)
  const randomNum = Math.floor(Math.random() * 900000) + 100000; // 100000-999999
  return 'VRV-CTR-' + randomNum.toString().padStart(6, '0');
}


async function loadPropertyManagementAgreement() {
  const hash = window.location.hash;
  const queryString = hash.includes('?') ? hash.split('?')[1] : '';
  const params = new URLSearchParams(queryString);
  const token = params.get('token');

  if (!token) return;

  try {
    // Try loading from contracts API first
    const res = await fetch(`/api/contracts?token=${encodeURIComponent(token)}`);
    if (res.ok) {
      const result = await res.json();
      if (result.success && result.contract) {
        const contract = result.contract;
        const lead = result.lead;
        
        App.state.contract = contract;
        App.state.client = {
          id: lead.id,
          contractId: contract.id,
          contractType: contract.contract_type,
          accessToken: contract.secure_token,
          claimantName: lead.full_name,
          trackingId: lead.tracking_id,
          propertyAddress: lead.property_address,
          propertyDetails: lead.property_details,
          askingPrice: lead.asking_price,
          estimatedValue: lead.estimated_value,
          offerAmount: lead.asking_price,  // Purchase Price = asking_price
          depositAmount: lead.deposit_amount || 0,  // Earnest Money = deposit_amount from wholesale_leads
          contractTerms: contract.deal_data.contract_terms || lead.contract_terms || '',
          governingState: contract.state,
          dateIssued: new Date(contract.created_at).toLocaleDateString()
        };

        if (contract.status === 'signed' && contract.signature_data) {
          App.state.signature = contract.signature_data;
          App.state.typedName = contract.signer_name || '';
          App.state.signedAt = contract.signed_at || new Date().toISOString();
        } else {
          App.state.signature = null;
          App.state.typedName = '';
          App.state.signedAt = null;
        }
        
        App.render();
        return;
      }
    }
  } catch (err) {
    console.warn('[Vorvo] Contracts API fetch failed, falling back to direct Supabase:', err);
  }

  // Fallback to direct wholesale_leads query
  const { data, error } = await supabaseClient
    .from('wholesale_leads')
    .select('*')
    .eq('access_token', token)
    .single();

  if (error) {
    console.error("[Vorvo] Supabase load error:", error.code, error.message, error.details, error.hint);
    return;
  }

  if (!data) {
    console.error('[Vorvo] No data returned for wholesale lead token:', token);
    return;
  }

  console.log('[Vorvo] Wholesale agreement loaded successfully:', data.tracking_id);

  App.state.contract = null;
  App.state.client = {
    id: data.id,
    accessToken: data.access_token,
    claimantName: data.full_name,
    trackingId: data.tracking_id,
    propertyAddress: data.property_address,
    propertyDetails: data.property_details,
    askingPrice: data.asking_price,
    estimatedValue: data.estimated_value,
    offerAmount: data.offer_amount,
    depositAmount: data.deposit_amount || 0,
    contractTerms: data.contract_terms || '',
    governingState: data.governing_state || 'TX',
    dateIssued: data.created_at ? new Date(data.created_at).toLocaleDateString() : ''
  };

  if (data.signed && data.signature_data) {
    App.state.signature = data.signature_data;
    App.state.typedName = data.signer_name || '';
    App.state.signedAt = data.signed_at || new Date().toISOString();
  } else {
    App.state.signature = null;
    App.state.typedName = '';
    App.state.signedAt = null;
  }

  App.render();
}

function setupWholesaleSignSubmit() {
  const typedInput = document.getElementById('typed-name');
  const confirmBox = document.getElementById('confirm-box');
  const submit = document.getElementById('sign-submit');
  const emailInput = document.getElementById('sign-email');

  const updateSubmitState = () => {
    const ready = document.getElementById('sig-pad')?.classList.contains('signed')
                 && typedInput?.value.trim().length >= 3
                 && confirmBox?.checked
                 && emailInput?.value.trim().length > 0;
    if (submit) submit.disabled = !ready;
  };

  typedInput?.addEventListener('input', updateSubmitState);
  confirmBox?.addEventListener('change', updateSubmitState);
  emailInput?.addEventListener('input', updateSubmitState);

  submit?.addEventListener('click', async () => {
    const errEl = document.getElementById('sign-error');
    const pad = document.getElementById('sig-pad');
    const canvas = document.getElementById('sig-canvas');
    const typedName = typedInput.value.trim();
    const clientEmail = emailInput.value.trim();

    if (!pad.classList.contains('signed')) {
      errEl.textContent = 'Please draw your signature in the box above.';
      errEl.style.display = 'block';
      return;
    }
    if (typedName.length < 3) {
      errEl.textContent = 'Please type your full legal name to confirm your signature.';
      errEl.style.display = 'block';
      return;
    }
    if (!confirmBox.checked) {
      errEl.textContent = 'Please check the confirmation box to agree to the terms.';
      errEl.style.display = 'block';
      return;
    }
    if (!clientEmail) {
      errEl.textContent = 'Please enter your email address.';
      errEl.style.display = 'block';
      return;
    }

    submit.disabled = true;
    submit.textContent = 'Submitting…';

    App.state.signature = canvas.toDataURL('image/png');
    App.state.typedName = typedName;
    App.state.signedAt = new Date().toISOString();
    App.saveSignedState();

    if (App.state.contract) {
      // Use the new contracts API
      try {
        const res = await fetch('/api/contracts?action=sign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token: App.state.contract.secure_token,
            signerName: typedName,
            signerEmail: clientEmail,
            signatureData: App.state.signature,
            ipAddress: App.state.ipAddress || 'unknown',
            userAgent: navigator.userAgent
          })
        });
        
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || 'Failed to sign contract');
        
        // Refresh the page
        await loadPropertyManagementAgreement();
        App.render();
      } catch (err) {
        console.error('Error signing contract:', err);
        alert('Failed to sign contract: ' + err.message);
        submit.disabled = false;
        submit.textContent = 'Accept Terms & Sign Agreement →';
      }
      return;
    }

    const leadId = App.state.client?.id;
    if (leadId) {
      const { error } = await supabaseClient
        .from('wholesale_leads')
        .update({
          signed: true,
          signature_data: App.state.signature,
          signer_name: typedName,
          signed_at: App.state.signedAt,
          email: clientEmail,
          status: 'under_contract'
        })
        .eq('id', leadId);

      if (error) {
        console.error('Supabase update failed for wholesale lead id', leadId, '—', error.message);
        alert('Failed to save signature: ' + error.message);
        submit.disabled = false;
        submit.textContent = 'Accept Terms & Sign Agreement →';
      } else {
        console.log('Supabase updated wholesale lead for id:', leadId);
        
        // Submit notification to Formspree
        const formspreeData = new FormData();
        formspreeData.append('subject', `Wholesale Purchase & Sale Agreement Signed - ${App.state.client?.trackingId}`);
        formspreeData.append('trackingId', App.state.client?.trackingId);
        formspreeData.append('signerName', typedName);
        formspreeData.append('propertyAddress', App.state.client?.propertyAddress);
        formspreeData.append('offerAmount', formatMoney(App.state.client?.askingPrice));
        
        fetch('https://formspree.io/f/xqejewzo', {
          method: 'POST',
          body: formspreeData,
          headers: { 'Accept': 'application/json' }
        }).catch(err => console.warn('Formspree notification error:', err));

        // SEND EMAIL — clean and simple, no PDF generation needed
        const accessToken = App.state.client?.accessToken;
        const agreementPageUrl = `${window.location.origin}${window.location.pathname}#/property-management-agreement?token=${accessToken}`;
        try {
          const res = await fetch('/api/send-wholesale-agreement', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              accessToken,
              typedName,
              signedAt: App.state.signedAt,
              trackingId: App.state.client?.trackingId || '',
              sellerName: App.state.client?.claimantName || typedName,
              propertyAddress: App.state.client?.propertyAddress || '',
              offerAmount: App.state.client?.askingPrice || null,
              depositAmount: App.state.client?.depositAmount || null,
              contractTerms: App.state.client?.contractTerms || '',
              clientEmail,
              ipAddress: App.state.ipAddress || 'unavailable',
              ipLocation: App.state.ipLocation || 'unavailable',
              agreementPageUrl,
            }),
          });
          const result = await res.json();
          if (!res.ok) console.error('[Vorvo] Email API error:', result);
          else console.log('[Vorvo] Email sent ✓');
        } catch (err) {
          console.error('[Vorvo] Email send failed:', err.message);
        }
        
        alert('Agreement Signed successfully! Your property is now under contract.');
        await loadPropertyManagementAgreement();
      }
    }
  });
}

async function loadAssignmentAgreement() {
  const hash = window.location.hash;
  const queryString = hash.includes('?') ? hash.split('?')[1] : '';
  const params = new URLSearchParams(queryString);
  const token = params.get('token');

  if (!token) return;

  try {
    const res = await fetch(`/api/contracts?token=${encodeURIComponent(token)}`);
    if (res.ok) {
      const result = await res.json();
      if (result.success && result.contract) {
        const contract = result.contract;
        const lead = result.lead;
        
        App.state.contract = contract;
        App.state.client = {
          id: lead.id,
          contractId: contract.id,
          contractType: contract.contract_type,
          accessToken: contract.secure_token,
          claimantName: lead.full_name,
          trackingId: lead.tracking_id,
          propertyAddress: lead.property_address,
          propertyDetails: lead.property_details,
          askingPrice: lead.asking_price,
          estimatedValue: lead.estimated_value,
          offerAmount: lead.asking_price,  // Purchase Price = asking_price
          depositAmount: lead.deposit_amount || 0,  // Earnest Money = deposit_amount from wholesale_leads
          contractTerms: contract.deal_data.contract_terms || lead.contract_terms || '',
          governingState: contract.state,
          dateIssued: new Date(contract.created_at).toLocaleDateString()
        };

        if (contract.status === 'signed' && contract.signature_data) {
          App.state.signature = contract.signature_data;
          App.state.typedName = contract.signer_name || '';
          App.state.signedAt = contract.signed_at || new Date().toISOString();
        } else {
          App.state.signature = null;
          App.state.typedName = '';
          App.state.signedAt = null;
        }
        
        App.render();
      }
    }
  } catch (err) {
    console.error('[Vorvo] Failed to load assignment agreement:', err);
  }
}

function setupAssignmentSignaturePad() {
  const pad = document.getElementById('as-sig-pad');
  const canvas = document.getElementById('as-sig-canvas');
  const clearBtn = document.getElementById('as-sig-clear');
  if (!pad || !canvas) return;

  const ctx = canvas.getContext('2d');
  let drawing = false;

  let lastWidth = 0;
  function resize() {
    const currentWidth = pad.offsetWidth;
    if (currentWidth === lastWidth) return;
    lastWidth = currentWidth;
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = currentWidth * ratio;
    canvas.height = pad.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    ctx.strokeStyle = '#15172b';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resize();
  window.addEventListener('resize', resize);

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  };

  const startDraw = (e) => {
    e.preventDefault();
    drawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    pad.classList.add('signed');
    const placeholder = pad.querySelector('.sig-pad__placeholder');
    if (placeholder) placeholder.style.display = 'none';
    
    // Trigger input events to update button state
    const event = new Event('input', { bubbles: true });
    document.getElementById('as-legal-name')?.dispatchEvent(event);
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const stopDraw = () => {
    drawing = false;
  };

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);

  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDraw, { passive: false });

  clearBtn?.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pad.classList.remove('signed');
    const placeholder = pad.querySelector('.sig-pad__placeholder');
    if (placeholder) placeholder.style.display = 'block';
    
    // Trigger input events to update button state
    const event = new Event('input', { bubbles: true });
    document.getElementById('as-legal-name')?.dispatchEvent(event);
  });
}

function setupAssignmentSignSubmit() {
  const legalNameInput = document.getElementById('as-legal-name');
  const emailInput = document.getElementById('as-email');
  const phoneInput = document.getElementById('as-phone');
  const addressInput = document.getElementById('as-address');
  const confirmBox = document.getElementById('as-confirm-box');
  const submit = document.getElementById('as-sign-submit');
  const fileInput = document.getElementById('as-pof-file');
  const uploadStatus = document.getElementById('as-pof-upload-status');

  let fileBase64 = null;

  fileInput?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        fileBase64 = event.target.result;
        if (uploadStatus) uploadStatus.style.display = 'inline';
      };
      reader.readAsDataURL(file);
    }
  });

  const updateSubmitState = () => {
    const ready = document.getElementById('as-sig-pad')?.classList.contains('signed')
                 && legalNameInput?.value.trim().length >= 3
                 && emailInput?.value.trim().length > 0
                 && phoneInput?.value.trim().length > 0
                 && addressInput?.value.trim().length > 0
                 && confirmBox?.checked;
    if (submit) submit.disabled = !ready;
  };

  [legalNameInput, emailInput, phoneInput, addressInput].forEach(input => {
    input?.addEventListener('input', updateSubmitState);
  });
  confirmBox?.addEventListener('change', updateSubmitState);

  submit?.addEventListener('click', async () => {
    const errEl = document.getElementById('as-sign-error');
    const pad = document.getElementById('as-sig-pad');
    const canvas = document.getElementById('as-sig-canvas');

    if (!pad.classList.contains('signed')) {
      errEl.textContent = 'Please draw your signature in the box.';
      errEl.style.display = 'block';
      return;
    }
    if (legalNameInput.value.trim().length < 3) {
      errEl.textContent = 'Please enter your full legal name.';
      errEl.style.display = 'block';
      return;
    }
    if (!confirmBox.checked) {
      errEl.textContent = 'Please check the confirmation box.';
      errEl.style.display = 'block';
      return;
    }

    submit.disabled = true;
    submit.textContent = 'Submitting Signature…';

    const signatureData = canvas.toDataURL('image/png');
    const buyerInfo = {
      legal_name: legalNameInput.value.trim(),
      entity_name: document.getElementById('as-entity-name').value.trim() || null,
      email: emailInput.value.trim(),
      phone: phoneInput.value.trim(),
      mailing_address: addressInput.value.trim(),
      proof_of_funds_url: document.getElementById('as-pof').value.trim() || fileBase64 || null
    };

    try {
      const res = await fetch('/api/contracts?action=sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: App.state.contract.secure_token,
          signerName: buyerInfo.legal_name,
          signerEmail: buyerInfo.email,
          signatureData,
          ipAddress: App.state.ipAddress || 'unknown',
          userAgent: navigator.userAgent,
          buyerInfo
        })
      });

      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Failed to sign assignment agreement');

      alert('Assignment Agreement Signed successfully!');
      await loadAssignmentAgreement();
      App.render();
    } catch (err) {
      console.error('Error signing assignment agreement:', err);
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      submit.disabled = false;
      submit.textContent = 'Accept Terms & Sign Assignment Agreement →';
    }
  });
}


 async function loadAgreement() {
  const hash = window.location.hash;
  const queryString = hash.includes('?') ? hash.split('?')[1] : '';
  const params = new URLSearchParams(queryString);
  const token = params.get('token');

  if (!token) return;

  const { data, error } = await supabaseClient
    .from('agreements')
    .select('*')
    .eq('access_token', token)
    .single();

  if (error) {
    console.error("[Vorvo] Supabase load error:", error.code, error.message, error.details, error.hint);
    // Show visible error on the page so it's easy to debug
    const app = document.getElementById('app');
    if (app) {
      app.innerHTML += `<div style="position:fixed;bottom:0;left:0;right:0;background:#8b3a2a;color:white;padding:12px 20px;font-family:monospace;font-size:13px;z-index:9999;">
        ⚠️ Agreement load failed (ID: ${agreementId}): ${error.message} [${error.code}]
        <br>Open DevTools Console for full details.
      </div>`;
    }
    return;
  }

  if (!data) {
    console.error('[Vorvo] No data returned for agreement ID:', agreementId);
    return;
  }

  console.log('[Vorvo] Agreement loaded successfully:', data.tracking_id);

  // BULLETPROOF MAPPING
  // This takes the exact column names from your Supabase screenshot
  // and forces them into the boxes the website expects.
  App.state.client = {
    id: data.id,
    accessToken: data.access_token,
    claimantName: data.claimant_name,
    trackingId: data.tracking_id,
    propertyId: data.property_id,
    reportedOwnerName: data.reported_owner,
    estimatedValue: data.estimated_value,
    feePercent: data.fee_percent || 10,
    dateResearched: data.research_date || '',
    dateIssued: data.created_at ? new Date(data.created_at).toLocaleDateString() : ''
  };

  // If already signed, load signature state from Supabase
  // so it displays correctly in any browser/incognito tab
  if (data.signed && data.signature_data) {
    App.state.signature = data.signature_data;
    App.state.typedName = data.signer_name || '';
    App.state.signedAt = data.signed_at || new Date().toISOString();
  }

  App.render();
}
